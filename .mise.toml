# ------------------------------------------------------------
# mise.toml — Optimized for fast installation and weak networks
# ------------------------------------------------------------
# Strategy:
# 1. Functional Grouping: Tools are organized by domain (Runtimes, Security, etc.)
# 2. Alphabetical Sorting: All entries are sorted within their respective blocks.
# 3. Explicit Providers: Use asdf:, npm:, pipx:, github: for Clarity & SSoT.
# 4. Network Acceleration: Environment mirrors for peak performance.
# 5. Pure SSoT: legacy_version_file=false to enforce mise.toml as the source.
# ------------------------------------------------------------

