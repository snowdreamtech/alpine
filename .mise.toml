# ------------------------------------------------------------
# mise.toml — Optimized for fast installation and weak networks
# ------------------------------------------------------------
# Strategy:
# 1. Prefer npm and pipx providers for tools available on registries
#    because they are faster and more stable under weak networks.
# 2. Use GitHub provider only for tools that are GitHub‑release‑only.
# 3. Apply GitHub proxy via url_replacements to accelerate downloads.
# 4. Keep all configuration explicit, auditable, and reproducible.
# ------------------------------------------------------------

[tools]

# ------------------------------------------------------------
# GitHub Release-only tools (no npm/pipx alternatives available)
# These rely on GitHub releases and benefit from proxy acceleration.
# ------------------------------------------------------------
"github:golangci/golangci-lint" = "1.64.5"
"go:golang.org/x/vuln/cmd/govulncheck" = "v1.1.4"
"github:google/osv-scanner" = "2.3.3"
"github:goreleaser/goreleaser" = "2.14.1"
"github:hadolint/hadolint" = "2.14.0"
"github:stackrox/kube-linter" = "0.8.1"
"github:terraform-linters/tflint" = "0.61.0"
"github:aquasecurity/trivy" = "0.69.3"
"github:lycheeverse/lychee" = "lychee-v0.23.0"
"github:nicklockwood/SwiftFormat" = "0.60.0"
"github:realm/SwiftLint" = "0.63.2"
"github:google/google-java-format" = "1.22.0"
"github:JohnnyMorganz/StyLua" = "2.0.2"
"github:bufbuild/buf" = "1.50.0"
"github:casey/just" = "1.39.0"
"github:go-task/task" = "3.41.0"
"github:cue-lang/cue" = "0.12.0"
"github:open-policy-agent/opa" = "1.2.0"
"github:google/go-jsonnet" = "0.20.0"

# ------------------------------------------------------------
# Default provider tools (mise native provider is fastest here)
# These tools have stable binary distributions or cached providers.
# ------------------------------------------------------------
checkmake = "0.3.2"
editorconfig-checker = "3.6.1"
gitleaks = "8.30.0"
node = "20.18.3"
pnpm = "9.15.5"
python = "3.12.9"

# These are managed via scripts/setup.sh to allow platform-aware
# and versioned installations without forcing CI failures.


# ------------------------------------------------------------
# npm-based tools (best performance under weak networks)
# npm registry can be mirrored (e.g., npmmirror.com) for speed.
# ------------------------------------------------------------
"npm:@commitlint/cli" = "20.4.3"
"npm:@commitlint/config-conventional" = "20.4.3"
"npm:bats" = "1.13.0"
"npm:bats-assert" = "2.2.4"
"npm:bats-support" = "0.3.0"
"npm:commitizen" = "4.3.1"
"npm:cz-conventional-changelog" = "3.3.0"
"npm:dockerfile-utils" = "0.16.3"
"npm:eslint" = "10.0.3"
"npm:markdownlint-cli2" = "0.21.0"
"npm:prettier" = "3.8.1"
"npm:sort-package-json" = "3.6.1"
"npm:stylelint" = "16.26.1"
"npm:stylelint-config-standard" = "37.0.0"
"npm:vitepress" = "1.6.4"
"npm:@taplo/cli" = "0.7.0"

# ------------------------------------------------------------
# pipx-based tools (stable and mirror-friendly)
# pipx benefits from PyPI mirrors (e.g., Tsinghua, Aliyun).
# ------------------------------------------------------------
"pipx:pre-commit" = "4.5.1"
"pipx:ruff" = "0.15.4"
"pipx:yamllint" = "1.38.0"
"pipx:sqlfluff" = "4.0.4"
"pipx:ansible-lint" = "26.1.1"
"pipx:shellcheck-py" = "0.11.0.1"
"pipx:actionlint-py" = "1.7.11.24"
"pipx:shfmt-py" = "3.12.0.2"
"pipx:clang-format" = "19.1.7"
"pipx:dotenv-linter" = "0.7.0"
"pipx:pip-audit" = "2.8.0"
"pipx:zizmor" = "1.3.1"

# ------------------------------------------------------------
# Global settings
# ------------------------------------------------------------
[settings]
experimental = true
asdf_compat = true
status.missing_tools = "never"

# Environment variables for performance acceleration in weak networks.
# Centralized SSoT for mirroring and registry configuration.
[env]
# Performance Toggles: set to "1" or "true" to activate
ENABLE_GITHUB_PROXY = "1"
PYTHONUTF8 = "1"

# Node.js & npm acceleration
NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com"
NODEJS_ORG_MIRROR = "https://mirrors.tuna.tsinghua.edu.cn/nodejs-release/"
MISE_NODE_MIRROR_URL = "https://mirrors.tuna.tsinghua.edu.cn/nodejs-release/"

# Python & pip acceleration
PIP_INDEX_URL = "https://pypi.tuna.tsinghua.edu.cn/simple"
PIP_TRUSTED_HOST = "pypi.tuna.tsinghua.edu.cn"
PYTHON_BUILD_MIRROR_URL = "https://mirrors.tuna.tsinghua.edu.cn/python/"
RUBY_BUILD_MIRROR_URL = "https://mirrors.tuna.tsinghua.edu.cn/ruby-build/"

# Go acceleration (China optimization)
GOPROXY = "https://goproxy.cn,direct"

# Rust & Cargo acceleration
RUSTUP_DIST_SERVER = "https://mirrors.tuna.tsinghua.edu.cn/rustup"
RUSTUP_UPDATE_ROOT = "https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup"

# GitHub Proxy (SSoT)
# Used specifically for direct GitHub binary/asset downloads
GITHUB_PROXY = "https://gh-proxy.sn0wdr1am.com/"

# Optional: Yarn support
YARN_REGISTRY = "https://registry.npmmirror.com"
# Tool Version SSoT (Managed via scripts/setup.sh)
