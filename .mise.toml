# ------------------------------------------------------------
# mise.toml — Two-tier Tool Management
# ------------------------------------------------------------
# TIER 1 (Core): Tools required for all projects — always installed.
# TIER 2 (On-demand): Language/domain-specific — installed by
#   scripts/lib/langs/*.sh when source files are detected.
# ------------------------------------------------------------

[tools]

# ── 🏗️ Core Runtimes ──────────────────────────────────────────────────────────
go = "1.26.1"
node = "25.8.2"
"npm:pnpm" = "10.33.0"
python = "3.14.3"
pipx = "1.11.0"


# ── 🔐 Security & Engineering (always needed) ──────────────────────────────────
gitleaks = "8.30.1"
"github:cli/cli" = "2.89.0"

# ── 💎 Core Quality & Commit Tooling ──────────────────────────────────────────
# Tools invoked by pre-commit hooks or universally needed.
checkmake = "0.3.2"
editorconfig-checker = "3.6.1"
"go:github.com/google/addlicense" = "v1.1.1"

# Git / commit workflow
"npm:@commitlint/cli" = "20.5.0"
"npm:@commitlint/config-conventional" = "20.5.0"
"npm:commitizen" = "4.3.1"
"npm:cz-conventional-changelog" = "3.3.0"

# Formatting & linting (invoked by pre-commit hooks)
"npm:prettier" = "3.8.1"

# Shell & scripting linters (pre-commit hooks)
"pipx:actionlint-py" = "1.7.11.24"
"pipx:pre-commit" = "4.5.1"
"pipx:shellcheck-py" = "0.11.0.1"
"pipx:shfmt-py" = "3.12.0.2"
"pipx:yamllint" = "1.38.0"

# ── DevOps/release tools used globally ──────────────────────────────────────────


# ------------------------------------------------------------
# Global settings
# ------------------------------------------------------------
[settings]
experimental = true
asdf_compat = true
# Settings and URL replacements for network reliability.
# Note: url_replacements do not support Jinja2/Tera templates directly in settings;
# simple key-value replacement of the URL prefix is performed.
http_timeout = "300s"
url_replacements = { "https://github.com" = "https://gh-proxy.sn0wdr1am.com/https://github.com" }


# ------------------------------------------------------------
# Environment variables for performance acceleration
# ------------------------------------------------------------
[env]
# GitHub Proxy Acceleration
ENABLE_GITHUB_PROXY = "{% if env.CI is defined %}0{% else %}1{% endif %}"
GITHUB_PROXY = "{% if env.CI is defined %}{% else %}https://gh-proxy.sn0wdr1am.com/{% endif %}"

# Feature Governance (0 = Disabled, 1 = Enabled)
CONFIG_AUTO_UPDATE = "1"

PYTHONUTF8 = "1"
# Corepack: bypass signature verification (fixes Windows Node 20 key mismatch)
COREPACK_INTEGRITY_KEYS = "0"

# Node.js & npm acceleration
NPM_CONFIG_REGISTRY = "{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}"
NODEJS_ORG_MIRROR = "{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}"
MISE_NODE_MIRROR_URL = "{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://npmmirror.com/mirrors/node/{% endif %}"

# Python & pip acceleration
PIP_INDEX_URL = "{% if env.CI is defined %}https://pypi.org/simple{% else %}https://mirrors.aliyun.com/pypi/simple{% endif %}"
PIP_TRUSTED_HOST = "{% if env.CI is defined %}pypi.org{% else %}mirrors.aliyun.com{% endif %}"
PYTHON_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.aliyun.com/python/{% endif %}"

# Ruby acceleration
RUBY_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.aliyun.com/ruby-build/{% endif %}"

# Go acceleration
GOPROXY = "{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://mirrors.aliyun.com/goproxy/,direct{% endif %}"
MISE_GO_DOWNLOAD_MIRROR = "{% if env.CI is defined %}https://dl.google.com/go/{% else %}https://mirrors.aliyun.com/golang/{% endif %}"

# Rust & Cargo acceleration
RUSTUP_DIST_SERVER = "{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.aliyun.com/rustup{% endif %}"
RUSTUP_UPDATE_ROOT = "{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.aliyun.com/rustup/rustup{% endif %}"
