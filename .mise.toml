# ------------------------------------------------------------
# mise.toml — Two-tier Tool Management
# ------------------------------------------------------------
# TIER 1 (Core): Tools required for all projects — always installed.
# TIER 2 (On-demand): Language/domain-specific — installed by
#   scripts/lib/langs/*.sh when source files are detected.
# ------------------------------------------------------------

[tools]

# ── 🏗️ Core Runtimes ──────────────────────────────────────────────────────────
node = "20.18.3"
pnpm = "10.30.3"
python = "3.12.9"

# ── 🔐 Security (always needed — git commit guard) ────────────────────────────
gitleaks = "8.30.0"

# ── 💎 Core Quality & Commit Tooling ──────────────────────────────────────────
# Tools invoked by pre-commit hooks or universally needed.
checkmake = "0.3.2"
editorconfig-checker = "3.6.1"

# Git / commit workflow
"npm:@commitlint/cli" = "20.5.0"
"npm:@commitlint/config-conventional" = "20.5.0"
"npm:bats" = "1.13.0"
"npm:commitizen" = "4.3.1"
"npm:cz-conventional-changelog" = "3.3.0"

# Formatting & linting (invoked by pre-commit hooks)
"npm:eslint" = "10.0.3"
"npm:markdownlint-cli2" = "0.21.0"
"npm:prettier" = "3.8.1"
"npm:sort-package-json" = "3.6.1"
"npm:@taplo/cli" = "0.7.0"

# Docker / Infrastructure linters (invoked by pre-commit hooks)
"github:hadolint/hadolint" = "2.14.0"
"npm:dockerfile-utils" = "0.16.3"

# Shell & scripting linters (pre-commit hooks)
"pipx:actionlint-py" = "1.7.11.24"
"pipx:pre-commit" = "4.5.1"
"pipx:ruff" = "0.15.4"
"pipx:shellcheck-py" = "0.11.0.1"
"pipx:shfmt-py" = "3.12.0.2"
"pipx:yamllint" = "1.38.0"

# Additional linters invoked by pre-commit hooks
"pipx:clang-format" = "19.1.7"
"pipx:dotenv-linter" = "0.7.0"
"pipx:sqlfluff" = "4.0.4"

# DevOps/release tools used globally
"github:goreleaser/goreleaser" = "2.14.1"
"pipx:zizmor" = "1.3.1"

# ── NOTE: All remaining tools are TIER 2 (on-demand). ─────────────────────────
# They are NOT listed here. Each scripts/lib/langs/*.sh module defines its
# own _PROVIDER with an inline version and installs via run_mise when
# the corresponding project files are detected.
# Examples: rust, java, kotlin, grain, moonbit, helm, terraform, kcl, pkl,
#           trivy, osv-scanner, cargo-audit, govulncheck, pip-audit, zizmor,
#           swiftlint, ktlint, spectral, kube-linter, stylelint, buf, opa,
#           cue, pkl, bazel, pulumi, duckdb, typst, lychee, vitepress, bun,
#           deno, zig, ruby, dotnet, yarn, bats, assemblyscript, etc.

# ------------------------------------------------------------
# Global settings
# ------------------------------------------------------------
[settings]
experimental = true
asdf_compat = true
status.missing_tools = "never"
legacy_version_file = false
plugin_autoupdate_last_check_duration = "1 week"


# ------------------------------------------------------------
# Environment variables for performance acceleration
# ------------------------------------------------------------
[env]
ENABLE_GITHUB_PROXY = "{% if env.CI is defined %}0{% else %}1{% endif %}"
PYTHONUTF8 = "1"
# Corepack: bypass signature verification (fixes Windows Node 20 key mismatch)
COREPACK_INTEGRITY_KEYS = "0"

# Node.js & npm acceleration
NPM_CONFIG_REGISTRY = "{% if env.CI is defined %}https://registry.npmjs.org{% else %}https://registry.npmmirror.com{% endif %}"
NODEJS_ORG_MIRROR = "{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://mirrors.tuna.tsinghua.edu.cn/nodejs-release/{% endif %}"
MISE_NODE_MIRROR_URL = "{% if env.CI is defined %}https://nodejs.org/dist/{% else %}https://mirrors.tuna.tsinghua.edu.cn/nodejs-release/{% endif %}"

# Python & pip acceleration
PIP_INDEX_URL = "{% if env.CI is defined %}https://pypi.org/simple{% else %}https://pypi.tuna.tsinghua.edu.cn/simple{% endif %}"
PIP_TRUSTED_HOST = "{% if env.CI is defined %}pypi.org{% else %}pypi.tuna.tsinghua.edu.cn{% endif %}"
PYTHON_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://www.python.org/ftp/python/{% else %}https://mirrors.tuna.tsinghua.edu.cn/python/{% endif %}"

# Ruby acceleration
RUBY_BUILD_MIRROR_URL = "{% if env.CI is defined %}https://cache.ruby-lang.org/pub/ruby/{% else %}https://mirrors.tuna.tsinghua.edu.cn/ruby-build/{% endif %}"

# Go acceleration
GOPROXY = "{% if env.CI is defined %}https://proxy.golang.org,direct{% else %}https://goproxy.cn,direct{% endif %}"

# Rust & Cargo acceleration
RUSTUP_DIST_SERVER = "{% if env.CI is defined %}https://static.rust-lang.org{% else %}https://mirrors.tuna.tsinghua.edu.cn/rustup{% endif %}"
RUSTUP_UPDATE_ROOT = "{% if env.CI is defined %}https://static.rust-lang.org/rustup{% else %}https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup{% endif %}"

# GITHUB_PROXY variable for scripts
GITHUB_PROXY = "{% if env.CI is defined %}{% else %}https://gh-proxy.sn0wdr1am.com/{% endif %}"
