<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00D2FF" />
            <stop offset="100%" stop-color="#3A7BD5" />
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#AD1DEB" />
            <stop offset="100%" stop-color="#6E48AA" />
        </linearGradient>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="20" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Background for the icon -->
    <rect width="1024" height="1024" rx="200" fill="#0F172A" />

    <g transform="translate(512, 512)">
        <!-- Central Core -->
        <circle r="120" fill="url(#mainGrad)" filter="url(#softGlow)" />

        <!-- Top arm -->
        <rect x="-40" y="-380" width="80" height="200" rx="40" fill="url(#mainGrad)" />
        <!-- Bottom arm -->
        <rect x="-40" y="180" width="80" height="200" rx="40" fill="url(#mainGrad)" />

        <!-- 60 Degree Rotated -->
        <g transform="rotate(60)">
            <rect x="-40" y="-380" width="80" height="200" rx="40" fill="url(#accentGrad)" />
            <rect x="-40" y="180" width="80" height="200" rx="40" fill="url(#accentGrad)" />
        </g>

        <!-- 120 Degree Rotated -->
        <g transform="rotate(120)">
            <rect x="-40" y="-380" width="80" height="200" rx="40" fill="url(#mainGrad)" />
            <rect x="-40" y="180" width="80" height="200" rx="40" fill="url(#mainGrad)" />
        </g>

        <!-- Inner connectivity accents -->
        <circle r="60" fill="#FFFFFF" opacity="0.3" />
    </g>
</svg>
