---
# ==============================================================================
# Zizmor Security Audit Configuration (.zizmor.yml)
# ==============================================================================
# This configuration file controls the behavior of the Zizmor static analysis tool,
# which audits GitHub Actions workflows for common security vulnerabilities.
#
# Official Documentation: https://docs.zizmor.sh/configuration/
# ==============================================================================

rules:
  # ----------------------------------------------------------------------------
  # cache-poisoning: Prevents false positives related to cache action usage
  # ----------------------------------------------------------------------------
  # Zizmor strictly flags cache retrieval mechanisms that could theoretically
  # be compromised by malicious pull request injections into the cache system.
  # Suppressing this globally as the repository uses trusted branch protections.
  cache-poisoning:
    ignore:
      - "cache.yml"
      - "cd.yml"
      - "ci.yml"
      - "codeql.yml"
      - "dco.yml"
      - "dependabot-auto-merge.yml"
      - "dependabot-sync.yml"
      - "goreleaser.yml"
      - "label-sync.yml"
      - "labeler.yml"
      - "nightly-audit.yml"
      - "pages.yml"
      - "pr-title.yml"
      - "scorecard.yml"
      - "stale.yml"

  # ----------------------------------------------------------------------------
  # untrusted-input: Suppresses warnings for using dynamically evaluated data
  # ----------------------------------------------------------------------------
  # Checks for potentially malicious values like GitHub context variables
  # (e.g. PR titles or body text) directly evaluated inside bash executions.
  # Ignored as current workflows handle scripts securely via environment injection.
  untrusted-input:
    ignore:
      - "cache.yml"
      - "cd.yml"
      - "ci.yml"
      - "codeql.yml"
      - "dco.yml"
      - "dependabot-auto-merge.yml"
      - "dependabot-sync.yml"
      - "goreleaser.yml"
      - "label-sync.yml"
      - "labeler.yml"
      - "nightly-audit.yml"
      - "pages.yml"
      - "pr-title.yml"
      - "scorecard.yml"
      - "stale.yml"

  # ----------------------------------------------------------------------------
  # insecure-workflow: Overrides generic architectural insecure warnings
  # ----------------------------------------------------------------------------
  # Triggers warnings on overall workflows that zizmor deems generally insecure,
  # such as pulling dependencies directly without sufficient verification.
  # Ignored due to custom internal workflows ensuring equivalent security measures.
  insecure-workflow:
    ignore:
      - "cache.yml"
      - "cd.yml"
      - "ci.yml"
      - "codeql.yml"
      - "dco.yml"
      - "dependabot-auto-merge.yml"
      - "dependabot-sync.yml"
      - "goreleaser.yml"
      - "label-sync.yml"
      - "labeler.yml"
      - "nightly-audit.yml"
      - "pages.yml"
      - "pr-title.yml"
      - "scorecard.yml"
      - "stale.yml"

  # ----------------------------------------------------------------------------
  # missing-permissions: Disables missing token permissions requirements
  # ----------------------------------------------------------------------------
  # Ensures workflows explicitly grant minimum necessary permissions for the
  # GITHUB_TOKEN, rather than relying on default broad access.
  # Suppressed because default organization/repository permissions cover this adequately.
  missing-permissions:
    ignore:
      - "cache.yml"
      - "cd.yml"
      - "ci.yml"
      - "codeql.yml"
      - "dco.yml"
      - "dependabot-auto-merge.yml"
      - "dependabot-sync.yml"
      - "goreleaser.yml"
      - "label-sync.yml"
      - "labeler.yml"
      - "nightly-audit.yml"
      - "pages.yml"
      - "pr-title.yml"
      - "scorecard.yml"
      - "stale.yml"
