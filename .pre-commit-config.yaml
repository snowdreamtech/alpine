---
# Pre-commit hook configuration (local mode).
# Uses project-local tools installed via scripts/setup.sh.
#
# Setup (one-time per machine):
#   sh scripts/setup.sh
#   # or with a custom venv path:
#   VENV=/path/to/.venv sh scripts/setup.sh
#
# Run manually against all files:
#   pre-commit run --all-files
fail_fast: true
default_stages: [pre-commit, pre-merge-commit]
exclude: '^(\.git|node_modules|\.venv|venv|env|vendor|dist|build|out|target|\.next|\.nuxt|\.output|__pycache__|\.specify)/'

repos:
  - repo: local
    hooks:
      # ── Git Hygiene (Local Mode) ───────────────────────────────────────────
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: sed -i '' -E 's/[[:space:]]*$//'
        language: system
        types: [text]
        exclude: '\.(bat|cmd|ps1)$'
        stages: [pre-commit, pre-merge-commit]
        description: "Automatically remove trailing whitespace at the end of lines."

      - id: end-of-file-fixer
        name: fix end of files
        entry: python3 -c 'import sys; f=sys.argv[1]; c=open(f,"rb").read(); open(f,"wb").write(c.rstrip()+b"\n") if c and not c.endswith(b"\n") else None'
        language: system
        types: [text]
        exclude: '\.(bat|cmd|ps1)$'
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure that files end with a single newline character."

      - id: check-added-large-files
        name: check for added large files
        entry: python3 -c 'import sys, os; [sys.exit(1) for f in sys.argv[1:] if os.path.getsize(f) > 500*1024]'
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent large files (>500KB) from being committed to the repository."

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: sh -c "! grep -qE '^(<<<<<<<|=======|>>>>>>>)' \"$@\"" --
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Intercept files that still contain git merge conflict markers."

      - id: check-executables-have-shebangs
        name: check executables have shebangs
        entry: python3 -c 'import sys, os; [sys.exit(1) for f in sys.argv[1:] if os.access(f, os.X_OK) and not open(f, "rb").read(2) == b"#!" and not os.path.isdir(f)]'
        language: system
        types: [text]
        description: "Verify that executable files have a proper shebang (!#) line."

      - id: check-shebang-scripts-are-executable
        name: check shebang scripts are executable
        entry: python3 -c 'import sys, os; [sys.exit(1) for f in sys.argv[1:] if open(f, "rb").read(2) == b"#!" and not os.access(f, os.X_OK)]'
        language: system
        types: [text]
        description: "Ensure that files starting with a shebang are marked as executable."

      # ── Secret Scanning ────────────────────────────────────────────────────
      - id: gitleaks
        name: gitleaks
        language: system
        entry: gitleaks protect --verbose --redact --staged --gitleaks-ignore-path .gitleaksignore
        always_run: true
        pass_filenames: false

      # ── Formatting ─────────────────────────────────────────────────────────
      - id: prettier
        name: prettier
        language: system
        entry: pnpm exec prettier
        args: [--write]
        types_or: [json, yaml, vue, javascript, jsx, ts, tsx]

      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -w
        types: [go]

      - id: shfmt
        name: shfmt
        language: system
        entry: .venv/bin/shfmt
        args: [-w, -s, -i, "2"]
        types: [shell]

      - id: taplo
        name: taplo
        language: system
        entry: pnpm exec taplo format
        types: [toml]

      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format
        types_or: [python, pyi]

      - id: clang-format
        name: clang-format
        language: system
        entry: .venv/bin/clang-format
        args: [-i]
        types_or: [objective-c, c, c++]

      # ── EditorConfig & Consistency ─────────────────────────────────────────
      - id: editorconfig-checker
        name: editorconfig-checker
        language: system
        entry: pnpm exec editorconfig-checker
        args:
          - -exclude
          - '(\.(venv|git|github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|specify|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml|tabnine|supermaven|vibe|void|zed)/.*)|((node_modules|venv|env|dist|build|out|target|vendor|__pycache__|\.specify)/.*|(\.aider\.conf\.yml))'

      # ── Linting & Quality ──────────────────────────────────────────────────
      - id: eslint
        name: eslint
        language: system
        entry: pnpm exec eslint
        args: [--fix]
        types_or: [javascript, ts, tsx, jsx, vue]

      - id: stylelint
        name: stylelint
        language: system
        entry: pnpm exec stylelint --fix
        types_or: [css, scss, less]

      - id: ruff
        name: ruff check
        language: system
        entry: ruff check --fix
        types_or: [python, pyi]

      - id: yamllint
        name: yamllint
        language: system
        entry: .venv/bin/yamllint
        args: [--config-file, .yamllint.yml]
        types: [yaml]

      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: pnpm exec markdownlint-cli2
        args: [--fix]
        types: [markdown]

      - id: shellcheck
        name: shellcheck
        language: system
        entry: .venv/bin/shellcheck
        types: [shell]

      - id: dockerfile-utils
        name: dockerfile-utils lint
        language: system
        entry: pnpm exec dockerfile-utils lint
        files: Dockerfile
        description: "Lightweight Dockerfile linter via pnpm. Full hadolint scan runs in CI."

      - id: actionlint
        name: actionlint
        language: system
        entry: .venv/bin/actionlint
        files: ^\.github/workflows/.*\.yml$
        description: "Linter for GitHub Actions workflow files."

      # ── Makefile ──────────────────────────────────────────────────────────
      - id: checkmake
        name: checkmake
        language: system
        entry: checkmake --config .checkmake.ini
        files: ^Makefile$
        description: "Linter for Makefiles. Requires checkmake installed locally."

      # ── SQL ────────────────────────────────────────────────────────────────
      - id: sqlfluff
        name: sqlfluff lint
        language: system
        entry: sqlfluff lint
        args: [--dialect, postgres]
        types_or: [sql]
        description: "SQL linter. Dialect defaults to postgres; override via .sqlfluff config."

      # ── Terraform / OpenTofu ───────────────────────────────────────────────
      # NOTE: tflint is heavy (requires plugin init) — run full scans in CI only.
      # Locally, only format/syntax checks via pre-commit.

      # ── Kubernetes ────────────────────────────────────────────────────────
      # NOTE: kube-linter is heavy (full manifest scan) — run in CI only.

      # ── Kotlin ────────────────────────────────────────────────────────────
      - id: ktlint
        name: ktlint
        language: system
        entry: pnpm exec ktlint
        types_or: [kotlin]
        description: "Kotlin linter and formatter. Via pnpm exec."

      # ── Java ──────────────────────────────────────────────────────────────
      - id: google-java-format
        name: google-java-format
        language: system
        entry: google-java-format --set-exit-if-changed --dry-run
        types: [java]
        description: "Java formatter (dry-run check). Requires google-java-format installed locally."

      # ── Ruby ──────────────────────────────────────────────────────────────
      - id: rubocop
        name: rubocop
        language: system
        entry: rubocop
        types: [ruby]
        description: "Ruby linter and formatter. Requires rubocop gem installed."

      # ── PHP ───────────────────────────────────────────────────────────────
      - id: php-cs-fixer
        name: php-cs-fixer
        language: system
        entry: php-cs-fixer fix --dry-run
        types: [php]
        description: "PHP code style checker (dry-run). Requires php-cs-fixer installed."

      # ── Dart / Flutter ────────────────────────────────────────────────────
      - id: dart-format
        name: dart format
        language: system
        entry: dart format --output=none --set-exit-if-changed
        types_or: [dart]
        description: "Dart formatter check. Requires dart SDK installed."

      # ── Swift (macOS only) ────────────────────────────────────────────────
      - id: swiftformat
        name: swiftformat
        language: system
        entry: swiftformat --lint
        types: [swift]
        description: "Swift formatter check. Requires swiftformat installed (macOS only)."

      - id: swiftlint
        name: swiftlint
        language: system
        entry: swiftlint lint --strict
        types: [swift]
        pass_filenames: false
        description: "Swift linter. Requires swiftlint installed (macOS only)."

      # ── C# / .NET ─────────────────────────────────────────────────────────
      - id: dotnet-format
        name: dotnet format
        language: system
        entry: dotnet format --verify-no-changes
        files: '\.(cs|vb|fs)$'
        pass_filenames: false
        description: "C# formatter check. Requires .NET SDK installed."

      # ── PowerShell ────────────────────────────────────────────────────────
      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: >-
          pwsh -NoProfile -Command
          "& { param([string[]]$paths) if (!(Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) { Write-Host 'PSScriptAnalyzer missing, skipping.'; exit 0 }; $r = Invoke-ScriptAnalyzer -Path $paths -Severity Error,Warning; if ($r) { $r | Format-Table -AutoSize; exit 1 } }" -args
        types: [powershell]
        description: "PowerShell script analyzer. Requires pwsh and PSScriptAnalyzer module."

      # ── API Contracts & Specifications ───────────────────────────────────────
      - id: spectral
        name: spectral
        language: system
        entry: pnpm exec spectral lint
        types_or: [json, yaml]
        files: '(?i)(openapi|swagger|asyncapi).*\.(json|yaml|yml)$'
        pass_filenames: true
        description: "Linter for OpenAPI/Swagger/AsyncAPI specifications."

      - id: sort-package-json
        name: sort-package-json
        entry: pnpm exec sort-package-json
        language: system
        files: ^package\.json$
        pass_filenames: true
        description: "Automatically sort package.json fields to maintain consistency."

      - id: dotenv-linter
        name: dotenv-linter
        entry: .venv/bin/dotenv-linter
        language: system
        files: '(\.env|\.env\.example|\.env\.sample)$'
        pass_filenames: true
        description: "Linter for .env files. Installed via requirements-dev.txt."

      # ── Git Commit Message Flow ──────────────────────────────────────────────
      - id: commitlint
        name: commitlint
        language: system
        entry: pnpm exec commitlint --edit
        always_run: true
        stages: [commit-msg, manual]
