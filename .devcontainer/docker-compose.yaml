---
version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached

    # Overrides default command so container doesn't exit immediately
    command: sleep infinity

    # Connect to the database and redis services
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=vscode
      - POSTGRES_PASSWORD=vscode
      - POSTGRES_DB=template
    volumes:
      - postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /run/postgresql:mode=1777
      - /tmp

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis-data:/data
    tmpfs:
      - /tmp

volumes:
  postgres-data:
  redis-data:
