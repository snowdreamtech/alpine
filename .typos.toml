# typos configuration for Snowdream Tech AI IDE Template
# Documentation: https://github.com/crate-ci/typos/blob/master/docs/config.md

[default]
extend-ignore-re = [
  # False positives from brand names and technical terms
  "HashiCorp",
  "typst",
  "htmx",
  "PSScriptAnalyzer",
  "commitlint",
  "conventional-changelog",
  "cz-conventional-changelog",
  "github-actions",
  "hadolint",
  "kube-linter",
  "markdownlint-cli2",
  "zizmor",
  "osv-scanner",
  "lycheeverse",
  "scalafmt",
  "ktlint",
  "ormolu",
  "nixpkgs-fmt",
  "shfmt",
  "taplo",
  "sqlfluff",
  "gitleaks",
  "tflint",
  "govulncheck",
  "checkmake",
]

[default.extend-words]
# Words to ignore globally
"HashiCorp" = "HashiCorp"
"typst" = "typst"
"edn" = "edn"

[files]
extend-exclude = [
  ".git",
  "node_modules",
  ".venv",
  "vendor",
  "dist",
  "build",
  "out",
  "target",
  ".next",
  ".nuxt",
  ".output",
  "__pycache__",
]
