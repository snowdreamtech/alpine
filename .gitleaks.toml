# .gitleaks.toml
# Gitleaks scan exclusion configuration.
#
# Design goals:
#   1. SCAN:  All project source, configuration, and script files.
#   2. SKIP:  Pure build artifacts, package manager caches, and binary-heavy
#             directories that never contain credentials.
#   3. SAFE:  For virtual environments (env/, venv/, .venv/), only skip their
#             standard subdirectories. The root is still scanned so a
#             misplaced .env file is caught.
#
# Patterns are Go regex matched against the full file path.
# Coverage: JS/TS, Python, Go, Java, Kotlin, Scala, Rust, Ruby, PHP,
#           C/C++, .NET, Dart/Flutter, Elixir, Haskell, iOS/Android,
#           Terraform, and common CI/CD tooling.

[allowlist]
description = "Skip build artifacts and package caches; scan all project source."
paths = [
  # ══════════════════════════════════════════════════════════════════════════
  # Git Internal Objects
  # These are content-addressed hashes, never user-authored secrets.
  # ══════════════════════════════════════════════════════════════════════════
  '''\.git/(objects|logs|refs|packed-refs|ORIG_HEAD|FETCH_HEAD)/''',

  # ══════════════════════════════════════════════════════════════════════════
  # JavaScript / TypeScript — Node.js, React, Vue, Angular, Svelte, etc.
  # ══════════════════════════════════════════════════════════════════════════

  # Package manager caches (third-party code, not project-authored)
  # NOTE: lock files (pnpm-lock.yaml, yarn.lock, etc.) are NOT excluded —
  #       they are text files and can occasionally embed tokens in registry URLs.
  '''(^|/)node_modules/''',

  # Build and cache output (framework-specific)
  '''(^|/)\.next/''',         # Next.js
  '''(^|/)\.nuxt/''',         # Nuxt.js
  '''(^|/)\.output/''',       # Nuxt/Nitro output
  '''(^|/)\.svelte-kit/''',   # SvelteKit
  '''(^|/)\.vite/''',         # Vite cache
  '''(^|/)\.cache/''',        # Yarn / Parcel / Gatsby cache
  '''(^|/)\.parcel-cache/''', # Parcel 2 cache
  '''(^|/)\.webpack/''',      # Webpack cache

  # ══════════════════════════════════════════════════════════════════════════
  # Python
  # ══════════════════════════════════════════════════════════════════════════

  # Virtual environment internals (root is scanned to catch misplaced .env files)
  '''(^|/)(\.venv|venv|env|\.env)/(bin|lib|lib64|include|share|scripts|Lib|Scripts)/''',

  # Python bytecode and tool caches
  '''(^|/)__pycache__/''',
  '''.*\.pyc$''',
  '''(^|/)\.pytest_cache/''',
  '''(^|/)\.mypy_cache/''',
  '''(^|/)\.ruff_cache/''',
  '''(^|/)\.hypothesis/''',

  # ══════════════════════════════════════════════════════════════════════════
  # Go
  # ══════════════════════════════════════════════════════════════════════════

  # go.sum IS scanned — it can contain proxy URLs with embedded credentials.
  # vendor/ contains third-party source code only.
  '''(^|/)vendor/''',

  # ══════════════════════════════════════════════════════════════════════════
  # Java / Kotlin / Scala
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.gradle/''', # Gradle cache & wrapper
  '''(^|/)\.m2/''',     # Maven local repository cache

  # ══════════════════════════════════════════════════════════════════════════
  # Rust
  # ══════════════════════════════════════════════════════════════════════════
  # Cargo.lock IS scanned — contains registry URLs that may embed tokens.
  # target/ contains build artifacts and compiled binaries only.

  # ══════════════════════════════════════════════════════════════════════════
  # Ruby
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.bundle/''',      # Bundler config & cache
  '''(^|/)vendor/bundle/''', # Gem installation path

  # ══════════════════════════════════════════════════════════════════════════
  # PHP (Composer)
  # ══════════════════════════════════════════════════════════════════════════
  # vendor/ already excluded above.

  # ══════════════════════════════════════════════════════════════════════════
  # .NET (C# / F# / VB)
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.nuget/''',  # NuGet package cache
  '''(^|/)packages/''', # Legacy NuGet packages folder

  # ══════════════════════════════════════════════════════════════════════════
  # Dart / Flutter
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.dart_tool/''',      # Dart tool cache
  '''(^|/)\.pub-cache/''',      # Pub package cache
  '''(^|/)\.flutter-plugins''',

  # ══════════════════════════════════════════════════════════════════════════
  # Elixir / Erlang
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)_build/''', # Elixir Mix build output
  '''(^|/)deps/''',   # Elixir Mix dependencies

  # ══════════════════════════════════════════════════════════════════════════
  # Haskell (Stack / Cabal)
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.stack-work/''', # Stack build artifacts

  # ══════════════════════════════════════════════════════════════════════════
  # iOS / macOS (Swift / Objective-C)
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)Pods/''',        # CocoaPods dependencies
  '''(^|/)\.build/''',     # Swift Package Manager build
  '''(^|/)DerivedData/''', # Xcode derived data

  # ══════════════════════════════════════════════════════════════════════════
  # Android
  # ══════════════════════════════════════════════════════════════════════════
  # .gradle/ already excluded above.

  # ══════════════════════════════════════════════════════════════════════════
  # Terraform / OpenTofu
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)\.terraform/''', # Provider plugins and modules cache

  # ══════════════════════════════════════════════════════════════════════════
  # Frontend / General Build Output
  # These directories are framework-agnostic build artifacts.
  # No developer-authored code or secrets should live here.
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)out/''',
  '''(^|/)target/''',
  '''(^|/)release/''',
  '''(^|/)public/build/''', # e.g., Laravel Mix, Symfony
  '''(^|/)www/''',          # e.g., Ionic, Capacitor web output

  # ══════════════════════════════════════════════════════════════════════════
  # Test Coverage, Reports & Temporary Artifacts
  # ══════════════════════════════════════════════════════════════════════════
  '''(^|/)coverage/''',
  '''(^|/)\.nyc_output/''', # NYC (Istanbul) coverage
  '''(^|/)\.tmp/''',
  '''(^|/)tmp/''',

  # ══════════════════════════════════════════════════════════════════════════
  # IDE and OS Artifacts
  # ══════════════════════════════════════════════════════════════════════════
  '''\.(DS_Store|Thumbs\.db)$''',
]
