---
name: 🐛 Bug Report
description: Create a report to help us improve the template
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this!
        Be sure to search [existing issues](https://github.com/snowdreamtech/template/issues) before opening a new one.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How to reproduce the behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What OS, IDE, and Agent are you using?
      placeholder: |
        - OS: [e.g. macOS 14.2]
        - IDE: [e.g. VS Code, Cursor]
        - Agent/Extension: [e.g. Cline, Mely]
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Verification
      options:
        - label: I have searched the existing issues to make sure this bug has not been reported yet.
          required: true
        - label: I have read the project rules and constitution.
          required: true
