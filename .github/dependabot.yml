---
# Dependabot Version Updates
# Purpose: Automatically maintains project dependencies to ensure security and stability.
# Trigger: Weekly schedule (synchronized across all ecosystems).
# Target Branch: dev (Ensures updates are validated in development before production).
# Design:
#   - Centralized manifest approach for all project technical stacks.
#   - Semantic 'chore(deps)' prefixing for clean version history.
#   - Automated labeling for improved maintenance visibility.

version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "github-actions"

  # Maintain dependencies for npm (linters and config)
