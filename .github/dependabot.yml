---
# Dependabot Version Updates (Auto-generated by scripts/gen-dependabot.sh)
#
# ⚠️  DO NOT EDIT MANUALLY — This file is regenerated automatically.
# To update, run: sh scripts/gen-dependabot.sh
# Or push to dev/main and the dependabot-sync workflow will update it.
#
# Purpose: Automatically maintains project dependencies to ensure security and stability.
# Target Branch: dev (Ensures updates are validated in development before production).
# Design:
#   - Only ecosystems with detected manifest files are included.
#   - Semantic 'chore(deps)' prefixing for clean version history.
#   - Automated labeling for improved maintenance visibility.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "npm"
    directory: "/docs"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "devcontainers"
    directory: "/.devcontainer"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "devcontainers"

  - package-ecosystem: "pre-commit"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "pre-commit"
