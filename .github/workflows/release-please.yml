---
name: Release Please

"on":
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  release-please:
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Using the manifest approach allows managing multiple components or a single monorepo seamlessly
          release-type: simple
