---
# Release Please (Automated Versioning & Changelogs)
# Purpose: Automatically creates release PRs, updates versions, and generates CHANGELOG.md.
# Trigger: Runs on every push to the default branch (main).
# Design:
#   - Depends on 'verify' to prevent broken releases.
#   - Uses the manifest approach to manage project versions seamlessly.
#   - Uses specific version tags for stable automation.

name: Release Please

"on":
  push:
    branches:
      - main

permissions:
  contents: write # Required for creating release tags and editing CHANGELOG.md
  pull-requests: write # Required for creating and updating release PRs
  statuses: write # Required for repository status integration
  security-events: write # Required if release includes vulnerability reports

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Pre-flight check before opening/merging releases
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  release-please:
    name: Manage Release PRs
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4.4.0
        with:
          # Uses the GITHUB_TOKEN for basic operations; a PAT is recommended for trigger cascading
          token: ${{ secrets.GITHUB_TOKEN }}
          # 'simple' release type for conventional commit projects
          release-type: simple
          config-file: .release-please-config.json
