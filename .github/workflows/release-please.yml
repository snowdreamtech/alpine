---
# Release Please (Automated Versioning & Changelogs)
# Purpose: Manages the release lifecycle by automating PR creation, versioning, and CHANGELOG updates.
# Trigger: Every push to the default branch (main).
# Permissions:
#   - contents: write (Required to create release tags and update the repository).
#   - pull-requests: write (Required to create and manage release PRs).
#   - statuses: write (Required to reflect release status in the GitHub UI).
#   - security-events: write (Required for SARIF report association).
# Concurrency:
#   - group: ${{ github.workflow }}-${{ github.ref }} (Ensures atomic release transitions).
#   - cancel-in-progress: true (Superseded by newer merges to main).
# Design:
#   - Depends on 'verify' pre-flight checks to prevent broken releases.
#   - Uses manifest approach for consistent monorepo or project versioning.

name: Release Please

"on":
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Pre-flight check before opening/merging releases
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  release-please:
    name: Manage Release PRs
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create release tags and update the repository
      pull-requests: write # Required to create and manage release PRs
      statuses: write # Required to reflect release status in the GitHub UI
      security-events: write # Required for SARIF report association
    timeout-minutes: 15
    steps:
      - name: "📝 Orchestrate Release Lifecycle (Release Please)"
        uses: googleapis/release-please-action@v4.4.0
        with:
          # Automates versioning, PR creation, and CHANGELOG updates based on Conventional Commits.
          token: ${{ secrets.GITHUB_TOKEN }}
          # 'simple' release type is optimized for standard conventional commit projects.
          release-type: simple
          config-file: .release-please-config.json
