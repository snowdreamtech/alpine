---
# CI (Continuous Integration)
# Purpose: Unified development pipeline covering Code Quality, Testing, and Security Auditing.
# Trigger: Every push and PR on non-main branches.
# Design:
#   - Sequential execution: Lint -> Test -> Audit.
#   - Fail-fast: Stop early if early stages fail to save resources.
#   - Secure: Runs in the context of the triggered ref, avoiding workflow_run risks.

name: "🔄 Continuous Integration"

"on":
  push:
    branches-ignore:
      - "main"
  pull_request:
    branches-ignore:
      - "main"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

env:
  # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_LOCKED: 1

jobs:
  # 0. Security Guard Stage (PR Only)
  dependency-review:
    name: "🛡️ Dependency Review"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "🔍 Dependency Review"
        uses: actions/dependency-review-action@3b1597519630bcc44ee6f06fd368297d09613ed8 # v4.5.0

  # 1. Code Quality Stage (Lint)
  lint:
    name: "🛡️ Quality Assurance Gate (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: lint-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 15
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            registry.npmjs.org:443
            repo.yarnpkg.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            mise.jdx.dev:443
            *.mise.jdx.dev:443
            *.nodesource.com:443
            index.docker.io:443
            auth.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            gcr.io:443
            *.gcr.io:443
            *.pkg.dev:443
            quay.io:443
            *.quay.io:443
            public.ecr.aws:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
          MISE_OFFLINE=true make check-env
        env:
          VENV: ${{ env.VENV }}
          SKIP_MODULES: security

      - name: "🔍 Inspect Code Quality (Lint)"
        shell: sh
        run: |
          MISE_OFFLINE=true make lint
        env:
          VENV: ${{ env.VENV }}

  # 2. Automated Testing Stage (Test)
  test:
    name: "🧪 Automated Testing Suite (${{ matrix.os }})"
    needs: [lint]
    runs-on: ${{ matrix.os }}
    concurrency:
      group: test-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 30
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            registry.npmjs.org:443
            repo.yarnpkg.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            mise.jdx.dev:443
            *.mise.jdx.dev:443
            proxy.golang.org:443
            sum.golang.org:443
            index.docker.io:443
            auth.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            gcr.io:443
            *.gcr.io:443
            *.pkg.dev:443
            quay.io:443
            *.quay.io:443
            public.ecr.aws:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "📦 Cache Language Dependencies (Advanced)"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.npm
            ~/.cache/pip
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.bundle/cache
            ~/.composer/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ~/.pub-cache
            ~/.bun/install/cache
            .build
            _build
            deps
            vendor
            node_modules
            target
          key: ${{ runner.os }}-lang-${{ hashFiles('**/go.mod', '**/package-lock.json', '**/requirements.txt', '**/Cargo.lock', '**/Gemfile.lock', '**/composer.lock', '**/build.gradle*', '**/pom.xml', '**/Package.resolved', '**/pubspec.lock', '**/mix.lock', '**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-lang-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
          MISE_OFFLINE=true make check-env
        env:
          VENV: ${{ env.VENV }}
          SKIP_MODULES: security

      - name: "🧪 Execute Multi-Stack Test Suite"
        shell: sh
        run: |
          MISE_OFFLINE=true make test
        env:
          VENV: ${{ env.VENV }}

  # 3. Security & Standards Audit Stage (Audit)
  audit:
    name: "🕵️ Security & Standards Audit (ubuntu-latest)"
    needs: [test]
    runs-on: ubuntu-latest
    concurrency:
      group: audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: read
      statuses: write
      security-events: write
    timeout-minutes: 20
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            registry.npmjs.org:443
            repo.yarnpkg.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            mise.jdx.dev:443
            *.mise.jdx.dev:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            public.ecr.aws:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            trivy-repo.aquasecurity.github.io:443
            *.aquasecurity.github.io:443
            production.cloudflare.docker.com:443
            gcr.io:443
            *.gcr.io:443
            *.pkg.dev:443
            quay.io:443
            *.quay.io:443
            public.ecr.aws:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: |
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
            .trivycache
          key: ${{ runner.os }}-mise-audit-${{ hashFiles('.mise.toml', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-audit-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
          MISE_OFFLINE=true make check-env
        env:
          VENV: ${{ env.VENV }}

      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          _OS=$(uname -s)
          case "$_OS" in
            MINGW*|MSYS*|CYGWIN*) _MISE_NPM_BASE="${LOCALAPPDATA}/mise/installs" ;;
            *) _MISE_NPM_BASE="${HOME}/.local/share/mise/installs" ;;
          esac
          _EXTRA_NODE_PATH=""
          if [ -d "$_MISE_NPM_BASE" ]; then
            for _pkg_dir in "$_MISE_NPM_BASE"/npm-*/*/lib/node_modules; do
              [ -d "$_pkg_dir" ] || continue
              _EXTRA_NODE_PATH="${_EXTRA_NODE_PATH}${_EXTRA_NODE_PATH:+:}${_pkg_dir}"
            done
          fi
          export NODE_PATH="${_EXTRA_NODE_PATH}${_EXTRA_NODE_PATH:+:}${NODE_PATH:-}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            mise exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            mise exec -- commitlint --last --verbose
          fi

      - name: "🛡️ Perform Security Audit"
        shell: sh
        run: |
          MISE_OFFLINE=true make audit
          # Extra SARIF export for GitHub Security Tab (Offline to prevent API rate limits)
          mise exec -- zizmor . --format sarif --offline > zizmor-results.sarif
        env:
          VENV: ${{ env.VENV }}
          TRIVY_CACHE_DIR: .trivycache

      - name: "⚡ Cache Documentation Links (Lychee)"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@646f281e7d806553258c49e25d2153545dfc79bd # v2.8.0
        if: ${{ always() }}
        with:
          args: --root-dir "${{ github.workspace }}" --verbose --no-progress --cache --exclude-path ".git" --exclude-path "node_modules" --exclude-path ".venv" --exclude-path "venv" --exclude-path "env" --exclude-path "vendor" --exclude-path "dist" --exclude-path "build" --exclude-path "out" --exclude-path "target" --exclude-path ".next" --exclude-path ".nuxt" --exclude-path ".output" --exclude-path "__pycache__" --exclude-path ".specify" '**/*.md'
          fail: true

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@18f2514ee9060368538b962c03036e73273e5fbf # v0.35.0
        if: ${{ always() }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"

      - name: "📤 Upload Security Audit (SARIF)"
        uses: github/codeql-action/upload-sarif@3e070868f0802c114e9f7832822a9693ed3ef5b9 # v4.34.1
        if: always()
        with:
          sarif_file: "."
