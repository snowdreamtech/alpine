---
# Container Metadata Synchronization
# Purpose: Synchronizes the project's README or description from GitHub with Docker Hub.
# Trigger: Every push to the main branch affecting README.md or this workflow file.
# Permissions:
#   - contents: read (Required to read README.md and repository description).

name: Container Metadata Synchronization

"on":
  push:
    branches:
      - "main"
    paths:
      - "README.md"
      - ".github/workflows/description.yml"

permissions: {}

jobs:
  docker-hub-sync:
    name: "📝 Synchronize Container Documentation (ubuntu-latest)"
    runs-on: ubuntu-latest
    concurrency:
      group: sync-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read # Required to read README.md
    timeout-minutes: 10
    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # [Required] Access token with `workflow` scope for potential updates.
          token: ${{ secrets.WORKFLOW_SECRET }}

      - name: "🏗️ Update Docker Hub Description/README"
        uses: christian-korneck/update-container-description-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_HUB_TOKEN }}
        with:
          destination_container_repo: snowdreamtech/alpine
          provider: dockerhub
          short_description: ${{ github.event.repository.description }}
          readme_file: "README.md"
