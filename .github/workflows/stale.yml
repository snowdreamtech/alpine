---
# Mark Stale Issues and PRs
# Purpose: Automatically identifies and closes inactive issues and pull requests to maintain backlog health.
# Trigger: Runs daily at 01:30 UTC.
# Design:
#   - Avoids bothering active contributors by exempting specific labels (pinned, security, bug).
#   - Implements concurrency to ensure only one maintenance run at a time.
#   - Uses stable version tags for maintenance tasks.

name: Mark Stale Issues and PRs

"on":
  schedule:
    # Staggered to run during low-traffic hours
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write # Required for labeling and closing issues
  pull-requests: write # Required for labeling and closing PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Maintenance tasks are usually fast API operations
    steps:
      - name: Mark Stale Issues and PRs
        uses: actions/stale@v10.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue is stale because it has been open for 60 days with no activity.
            Remove the stale label or comment, otherwise this will be closed in 7 days.
          stale-pr-message: >
            This pull request is stale because it has been open for 60 days with no activity.
            Remove the stale label or comment, otherwise this will be closed in 7 days.
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          days-before-issue-stale: 60
          days-before-pr-stale: 60
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security,bug"
