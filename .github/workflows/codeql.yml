---
# CodeQL Security Analysis (Advanced Setup)
# Purpose: Deep semantic code analysis to detect vulnerabilities and security flaws.
# Trigger: Runs on pushes to main/dev/feature branches, PRs, and weekly on Mondays.
# Design:
#   - Explicitly controls scanned languages to reduce false positives.
#   - Uses concurrency to optimize CI minutes on active PRs.
#   - Implements high timeouts due to the nature of static analysis deep scans.

name: CodeQL

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  schedule:
    # Staggered weekly scan to ensure deep coverage outside peak hours
    - cron: "0 3 * * 1"

permissions:
  contents: read # Required for code checkout
  security-events: write # Required for posting analysis results
  actions: read # Required to find current workflow run

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Deep scans on large repos can take significant time

    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          # Uncomment the following lines when source files exist in the repo:
          # - go                    # Go (*.go) — golangci-lint, gofmt
          # - python                # Python (*.py) — ruff, ansible-lint
          # - javascript-typescript # JS/TS (*.js, *.ts, *.jsx, *.tsx) — eslint
          # - c-cpp                 # C/C++/Obj-C (*.c, *.cpp, *.h) — clang-format
          # - csharp                # C# (*.cs) — dotnet format
          # - java-kotlin           # Java/Kotlin (*.java, *.kt) — ktlint
          # - ruby                  # Ruby (*.rb) — rubocop
          # - swift                 # Swift (*.swift) — swiftformat, swiftlint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.32.5
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.32.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.32.5
        with:
          category: "/language:${{ matrix.language }}"
