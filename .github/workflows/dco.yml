    branches: [main, dev]

permissions: {}

jobs:
  dco:
    name: "🛡️ Verify Signed-off-by"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "🛡️ Check DCO Signature"
        uses: tisonkun/actions-dco@v1.1
