---
# DCO Check
# Purpose: Enforces the Developer Certificate of Origin (DCO) by verifying commits include 'Signed-off-by'.
# Standards: Rule 07 (Git), Industry Best Practices for OSS Governance.

name: "✍️ DCO"

"on":
  pull_request:
    branches: [main, dev]

permissions: {}

env:
  MISE_LOCKED: 1

jobs:
  dco:
    name: "🛡️ Verify Signed-off-by"
    runs-on: ubuntu-latest
    # Skip DCO check for bot-created PRs (release-please, dependabot, etc.)
    # Check PR author, not branch name, to prevent bypass attempts
    if: |
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'release-please[bot]'
    concurrency:
      group: dco-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.mise.jdx.dev:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443

      - name: "🛡️ Check DCO Signature"
        uses: tisonkun/actions-dco@f1024cd563550b5632e754df11b7d30b73be54a5 # v1.1
        # This action fails if any commit in the PR lacks a 'Signed-off-by' line.
