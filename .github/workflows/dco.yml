---
# DCO Check
# Purpose: Enforces the Developer Certificate of Origin (DCO) by verifying commits include 'Signed-off-by'.
# Standards: Rule 07 (Git), Industry Best Practices for OSS Governance.

name: "✍️ DCO"

"on":
  pull_request:
    branches: [main, dev]

permissions: {}

env:
  # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_LOCKED: 1

jobs:
  dco:
    name: "🛡️ Verify Signed-off-by"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0 # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443





      - name: "🛡️ Check DCO Signature"
        uses: tisonkun/actions-dco@6d1f8a197db1b04df1769707b46b9366b1eca902 # v1.1 # v1.1
        # This action fails if any commit in the PR lacks a 'Signed-off-by' line.
