---
# PR Title Check
# Purpose: Verifies that pull request titles adhere to the Conventional Commits specification.
# Trigger: PR events (opened, edited, synchronize).
# Permissions:
#   - pull-requests: read (Required to read the pull request metadata via the GitHub API).
# Concurrency:
#   - group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Immediate feedback on updated PR titles).
# Design:
#   - Uses 'pull_request_target' to allow linting even from fork contributions.
#   - Near-instant global verification to maintain repository history purity.

name: "✅ PR Title Check"

"on":
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions: {}

env:
  MISE_LOCKED: 1

jobs:
  commitlint:
    name: "🔍 Semantic Title Validation"
    runs-on: ubuntu-latest
    concurrency:
      group: pr-title-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      pull-requests: read # Required to read the pull request metadata via the GitHub API
      statuses: write # Required to post status check results
    timeout-minutes: 15 # Title linting is near-instant
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            *.mise.jdx.dev:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            api.github.com:443
            *.githubusercontent.com:443
            github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443

      - name: "🔍 Validate PR Title Integrity"
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Ensures PR titles follow Conventional Commits to maintain repository history purity.
          requireScope: false
          validateSingleCommit: true
