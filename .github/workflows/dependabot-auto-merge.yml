---
name: "🚢 Dependabot Auto-Merge"

"on":
  pull_request:
    branches: ["dev"]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: "🤖 Approve & Auto-Merge"
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bdad212e5be703cd14 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: "📂 Checkout Code"
        uses: actions/checkout@1d96c3a830132f11fdf16401030e64f2b380ed33 # v6.0.2
        with:
          persist-credentials: false

      - name: "📊 Fetch Dependabot Metadata"
        id: metadata
        uses: dependabot/fetch-metadata@d7267f6f1969a531d2797e84180d04c10ac25528 # v2.3.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "✅ Approve PR (for Branch Protection)"
        # Automatically approve patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        shell: sh
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr review --approve "$PR_URL"

      - name: "🚢 Enable Auto-Merge"
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        shell: sh
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # gh pr merge --auto --merge "$PR_URL"
          # gh pr merge --auto --squash "$PR_URL"
          gh pr merge --auto --rebase "$PR_URL"
