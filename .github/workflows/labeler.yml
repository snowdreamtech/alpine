---
# Pull Request Labeler
# Purpose: Automatically triages pull requests by applying labels based on modified file paths.
# Trigger: Runs on PR events (opened, synchronized, reopened).
# Design:
#   - Uses 'pull_request_target' to allow labeler access to the repo even from fork PRs.
#   - Implements concurrency to prevent duplicate labeling runs.
#   - Uses specific version tags for stability.

name: Pull Request Labeler

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # Base permission
  pull-requests: write # Required for adding labels to PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Path-based labeling is extremely fast
    steps:
      - name: Triage Pull Request
        uses: actions/labeler@v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
