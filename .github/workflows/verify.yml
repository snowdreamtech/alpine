---
# Project Verification
# Purpose: Lightweight pre-flight check for project integrity, environment health, and basic security.
# Trigger: Runs on core branch events. Designed as a gate for main-line stability.
# Permissions:
#   - contents: read (Required for repository inspection).
# Concurrency:
#   - group: verify-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Efficient verification cycle).
# Design:
#   - Reuses production-grade 'make verify' and 'make audit' scripts.
#   - Fast feedback: Optimized for speed over depth (depth provided by 'test' job).

name: Project Verification

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read # Required for environment inspection and code review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Lightweight check that should finish fast
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24.1.0" # Explicit stable version

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Project Setup
        shell: sh
        run: make setup

      - name: Install Project Dependencies
        shell: sh
        run: make install

      - name: Run Full Verification
        shell: sh
        run: make verify

      - name: Run Security Audit
        shell: sh
        run: make audit
