---
# Project Verification
# Purpose: Lightweight pre-flight check for project integrity, environment health, and basic security.
# Trigger: Runs on core branch events. Designed as a gate for main-line stability.
# Permissions:
#   - contents: read (Required for repository inspection).
# Concurrency:
#   - group: verify-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Efficient verification cycle).
# Design:
#   - Reuses production-grade 'make verify' and 'make audit' scripts.
#   - Fast feedback: Optimized for speed over depth (depth provided by 'test' job).

name: Project Verification

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: verify-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      # Ensures full cross-platform compatibility across all supported operating systems.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read # Required for repository inspection
    timeout-minutes: 15 # Lightweight check that should finish fast
    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # Fetches source code to perform pre-flight integrity and health checks.
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-
            ${{ runner.os }}-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "🧪 Validate Project Health (Verify)"
        shell: sh
        run: |
          # Executes a rapid, high-level verification of environment, syntax, and logic.
          make verify

      - name: "🛡️ Audit Dependency Supply Chain"
        shell: sh
        run: |
          # Scans for vulnerabilities to ensure the build pipeline remains secure.
          make audit
