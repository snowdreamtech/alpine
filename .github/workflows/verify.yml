---
# Project Verification
# Purpose: Lightweight pre-flight check for project integrity, environment health, and basic security.
# Trigger: Runs on core branch events. Designed as a gate for main-line stability.
# Permissions:
#   - contents: read (Required for repository inspection).
# Concurrency:
#   - group: verify-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Efficient verification cycle).
# Design:
#   - Reuses production-grade 'make verify' and 'make audit' scripts.
#   - Fast feedback: Optimized for speed over depth (depth provided by 'test' job).

name: Project Verification

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      # Ensures full cross-platform compatibility across all supported operating systems.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read # Required for repository inspection
    timeout-minutes: 15 # Lightweight check that should finish fast
    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        # Fetches source code to perform pre-flight integrity and health checks.

      - name: "📦 Configure pnpm Package Manager"
        uses: pnpm/action-setup@v4.2.0
        # pnpm is required to bootstrap Node-based verification tools.

      - name: "🟢 Configure Node.js Runtime"
        uses: actions/setup-node@v6.3.0
        with:
          # Aligns the Node environment with the project's supported stable version.
          node-version: "24.1.0"

      - name: "🐍 Configure Python Runtime"
        uses: actions/setup-python@v6.2.0
        with:
          # Python is leveraged for core health auditing and logic pre-flighting.
          python-version: "3.12"

      - name: "🔧 Align Runtime Environment"
        shell: sh
        run: |
          # Prepares the CI runner to mirror the production development environment.
          make setup

      - name: "📦 Bootstrap Project Dependencies"
        shell: sh
        run: |
          # Installs all cross-stack dependencies required for full verification.
          make install

      - name: "🧪 Validate Project Health (Verify)"
        shell: sh
        run: |
          # Executes a rapid, high-level verification of environment, syntax, and logic.
          make verify

      - name: "🛡️ Audit Dependency Supply Chain"
        shell: sh
        run: |
          # Scans for vulnerabilities to ensure the build pipeline remains secure.
          make audit
