---
# GoReleaser (Automated Artifact Delivery)
# Purpose: Compiles Go projects, creates GitHub Releases, and pushes artifacts/checksums.
# Trigger: Runs when a new tag (e.g., v1.0.0) is pushed.
# Design:
#   - Depends on 'verify' to ensure code quality before release.
#   - Uses TAG pinning for stability while allowing minor updates.
#   - Implements concurrency to ensure only one release run per tag.

name: GoReleaser

"on":
  push:
    tags:
      - "*"

permissions:
  contents: write # Required for creating releases and uploading assets
  statuses: write # Required for updating commit statuses
  security-events: write # Required if release includes security reports

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Reusable workflow for pre-flight checks
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  goreleaser:
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Go compilation and asset upload usually completes in <10m
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # Required: Fetch all tags/history for GoReleaser to determine version
          token: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          distribution: goreleaser
          version: "~> v2" # Pins to the latest v2 minor/patch
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
