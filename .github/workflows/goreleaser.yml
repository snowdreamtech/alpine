---
# GoReleaser (Build & Release Automation)
# Purpose: Orchestrates the compilation, packaging, and distribution of Go binaries and artifacts.
# Trigger: Pushes to 'main' or specific version tags.
# Permissions:
#   - contents: write (Required to create GitHub Releases, upload assets, and push tags).
#   - packages: write (Required for container registry publishing if configured).
# Concurrency:
#   - group: ${{ github.workflow }}-${{ github.ref }} (Ensures atomic release operations).
#   - cancel-in-progress: false (Release processes must complete to avoid partial releases).
# Design:
#   - Focused on dry-run validation for non-tag pushes to ensure build integrity.
#   - Uses specific semantic version tags for GoReleaser to ensure build reproducibility.

name: GoReleaser

"on":
  push:
    tags:
      - "*"

permissions:
  contents: write # Required for creating releases and uploading assets
  statuses: write # Required for updating commit statuses
  security-events: write # Required if release includes security reports

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Reusable workflow for pre-flight checks
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  goreleaser:
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Go compilation and asset upload usually completes in <10m
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # Required: Fetch all tags/history for GoReleaser to determine version
          token: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          distribution: goreleaser
          version: "~> v2" # Pins to the latest v2 minor/patch
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
