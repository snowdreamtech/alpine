---
name: "🏷️ Label Synchronization"

"on":
  push:
    branches: ["main", "dev"]
    paths:
      - "scripts/sync-labels.sh"
      - ".github/workflows/label-sync.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    name: "🔄 Sync Repo Labels"
    runs-on: ubuntu-latest
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0 # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            github.com:443

      - name: "📂 Checkout Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # v4.2.2
        with:
          persist-credentials: false

      - name: "🏷️ Sync Labels via gh CLI"
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/sync-labels.sh
