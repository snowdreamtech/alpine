---
name: "🏷️ Label Synchronization"

"on":
  push:
    branches: ["main", "dev"]
    paths:
      - "scripts/sync-labels.sh"
      - ".github/workflows/label-sync.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync:
    name: "🔄 Sync Repo Labels"
    runs-on: ubuntu-latest
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "🏷️ Sync Labels via gh CLI"
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/sync-labels.sh
