---
# Code Quality
# Purpose: Unified linter (pre-commit).
# Trigger: Every push and PR on non-main branches to ensure high standards.
# Permissions:
#   - contents: read (Required for codebase inspection).
# Concurrency:
#   - group: lint-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Superseded by newer commits to minimize redundant CI load).
# Design:
#   - POSIX-compliant shell enforcement for all inspection steps.

name: Code Quality

"on":
  push:
    branches:
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: "🛡️ Quality Assurance Gate (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: lint-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read # Required for codebase inspection
    timeout-minutes: 15 # Portability check for linters
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}
      PYTHONUTF8: 1

    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "🔍 Inspect Code Quality (Lint)"
        shell: sh
        run: |
          make lint
        env:
          VENV: ${{ env.VENV }}
