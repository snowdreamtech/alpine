---
name: Lint

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"
  workflow_call:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        type: string
        default: ".venv"

permissions:
  contents: write
  pull-requests: read
  statuses: write
  security-events: write

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set env variables
        run: |
          {
            echo "BRANCH=${GITHUB_REF##*/}"
            echo "http_proxy=${http_proxy}"
            echo "no_proxy=${no_proxy}"
          } >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24.1.0"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Project Setup
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Run Commitlint Check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            pnpm exec commitlint --last --verbose
          fi

      - name: Run Unified Linting
        run: make lint
        env:
          VENV: ${{ env.VENV }}

      - name: Run Security Audit
        run: make audit
        env:
          VENV: ${{ env.VENV }}

      - name: Run Lychee (Link Checker)
        uses: lycheeverse/lychee-action@v2.8.0
        if: ${{ always() }}
        with:
          args: --root-dir "${{ github.workspace }}" --verbose --no-progress --exclude-path ".git" --exclude-path "node_modules" --exclude-path ".venv" --exclude-path "venv" --exclude-path "env" --exclude-path "vendor" --exclude-path "dist" --exclude-path "build" --exclude-path "out" --exclude-path "target" --exclude-path ".next" --exclude-path ".nuxt" --exclude-path ".output" --exclude-path "__pycache__" --exclude-path ".specify" '**/*.md'
          fail: true

      - name: Run Trivy Vulnerability Scanner (SARIF)
        uses: aquasecurity/trivy-action@0.34.2
        if: ${{ always() }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"
          version: "v0.69.2"
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          skip-dirs: ".git,node_modules,.venv,venv,env,vendor,dist,build,out,target,.next,.nuxt,.output,__pycache__,.specify"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4.32.5
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: "trivy-results.sarif"
