---
# Code Quality & Security Audit
# Purpose: Unified linter and security scanner (Commitlint, Lychee, Trivy, pre-commit).
# Trigger: Every push and PR to ensure high standards during the development lifecycle.
# Permissions:
#   - contents: read (Required for codebase inspection).
#   - pull-requests: read (Required to analyze PR context in Commitlint).
#   - statuses: write (Required to update commit status indicators).
#   - security-events: write (Required for uploading Trivy SARIF audit reports).
# Concurrency:
#   - group: lint-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Superseded by newer commits to minimize redundant CI load).
# Design:
#   - Fail-fast strategy: Lints code before more expensive security scans.
#   - POSIX-compliant shell enforcement for all inspection steps.

name: Quality & Audit

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"
  workflow_call:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        type: string
        default: ".venv"

permissions: {}

jobs:
  lint:
    name: "🛡️ Quality Assurance Gate (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: lint-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read # Required for codebase inspection
    timeout-minutes: 15 # Portability check for linters
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}

    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "🔍 Inspect Code Quality (Lint)"
        shell: sh
        run: |
          make lint
        env:
          VENV: ${{ env.VENV }}

  audit:
    name: "🕵️ Security & Standards Audit (ubuntu-latest)"
    runs-on: ubuntu-latest
    concurrency:
      group: audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read # Required for codebase inspection
      pull-requests: read # Required to analyze PR context in Commitlint
      statuses: write # Required to update commit status indicators
      security-events: write # Required for uploading Trivy SARIF audit reports
    timeout-minutes: 20 # Full scan including Trivy
    env:
      VENV: ${{ github.event.inputs.venv || inputs.venv || '.venv' }}

    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            mise exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            mise exec -- commitlint --last --verbose
          fi

      - name: "🛡️ Perform Security Audit"
        shell: sh
        run: |
          make audit
        env:
          VENV: ${{ env.VENV }}

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@v2.8.0
        if: ${{ always() }}
        with:
          args: --root-dir "${{ github.workspace }}" --verbose --no-progress --exclude-path ".git" --exclude-path "node_modules" --exclude-path ".venv" --exclude-path "venv" --exclude-path "env" --exclude-path "vendor" --exclude-path "dist" --exclude-path "build" --exclude-path "out" --exclude-path "target" --exclude-path ".next" --exclude-path ".nuxt" --exclude-path ".output" --exclude-path "__pycache__" --exclude-path ".specify" '**/*.md'
          fail: true

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@0.35.0
        if: ${{ always() }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"
          version: "v0.69.3"
          token-setup-trivy: ${{ secrets.GITHUB_TOKEN }}
          skip-dirs: ".git,node_modules,.venv,venv,env,vendor,dist,build,out,target,.next,.nuxt,.output,__pycache__,.specify"

      - name: "📊 Upload Audit Intelligence (SARIF)"
        uses: github/codeql-action/upload-sarif@v4.32.5
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: "trivy-results.sarif"
