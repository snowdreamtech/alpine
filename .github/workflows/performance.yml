---
name: 🚀 Performance Testing

"on":
  pull_request:
    paths:
      - "scripts/lib/**/*.sh"
      - "scripts/setup.sh"
      - ".mise.toml"
      - "scripts/lib/versions.sh"
      - ".github/workflows/performance.yml"
  workflow_dispatch: {}

jobs:
  performance-test:
    name: Performance Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Load baseline
        id: baseline
        run: |
          if [ -f "benchmarks/baseline-${{ matrix.platform }}.json" ]; then
            echo "baseline_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseline_exists=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Run performance tests
        id: perf_test
        run: |
          ./scripts/test-performance.sh --output-format json > current-performance.json
        shell: bash
        continue-on-error: true

      - name: Compare against baseline
        id: compare
        if: steps.baseline.outputs.baseline_exists == 'true'
        run: |
          ./scripts/compare-performance.sh \
            --baseline benchmarks/baseline-${{ matrix.platform }}.json \
            --current current-performance.json \
            --output-format markdown > comparison-report.md
        shell: bash
        continue-on-error: true

      - name: Store performance data
        run: |
          mkdir -p benchmarks/history
          COMMIT_SHA=$(git rev-parse HEAD)
          cp current-performance.json "benchmarks/history/${COMMIT_SHA}-${{ matrix.platform }}.json"
        shell: bash

      - name: Upload performance artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-data-${{ matrix.platform }}
          path: |
            current-performance.json
            comparison-report.md
            benchmarks/history/*.json
          retention-days: 90

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.baseline.outputs.baseline_exists == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let comment = `## Performance Test Results (${{ matrix.platform }})\n\n`;

            if (fs.existsSync('comparison-report.md')) {
              const report = fs.readFileSync('comparison-report.md', 'utf8');
              comment += report;
            } else {
              comment += '⚠️ No baseline found for comparison.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check for regressions
        if: steps.compare.outcome == 'failure'
        run: |
          echo "::error::Performance regression detected on ${{ matrix.platform }}"
          exit 1
        shell: bash

  cleanup-old-data:
    name: Cleanup Old Performance Data
    runs-on: ubuntu-latest
    needs: performance-test
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cleanup old performance data
        run: |
          cd benchmarks/history || exit 0
          # Keep last 100 measurements per platform
          for platform in linux macos windows; do
            find . -maxdepth 1 -name "*-${platform}.json" -type f | sort -r | tail -n +101 | xargs -r rm -f
          done
        shell: bash
        continue-on-error: true
