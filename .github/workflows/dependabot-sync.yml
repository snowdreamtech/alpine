---
# Dependabot Smart Sync
# Purpose: Automatically regenerates .github/dependabot.yml based on detected ecosystems.
# Trigger: Push to dev/main (manifest file changes), monthly schedule, or manual dispatch.
# Design:
#   - Uses scripts/gen-dependabot.sh to scan for manifest files via git ls-files.
#   - Only commits if the generated config differs from the current one.
#   - Uses native git commands — no third-party commit Actions.

name: "🤖 Dependabot Smart Sync"

"on":
  push:
    branches: ["dev", "main"]
    paths:
      # Trigger when manifest files or the generator script change
      - "package.json"
      - "**/package.json"
      - "go.mod"
      - "**/go.mod"
      - "Cargo.toml"
      - "**/Cargo.toml"
      - "requirements.txt"
      - "**/requirements.txt"
      - "Dockerfile"
      - "**/Dockerfile"
      - "composer.json"
      - "**/composer.json"
      - "Gemfile"
      - "**/Gemfile"
      - "mix.exs"
      - "pubspec.yaml"
      - "Package.swift"
      - "**/*.tf"
      - "**/devcontainer.json"
      - ".pre-commit-config.yaml"
      - "Chart.yaml"
      - "scripts/gen-dependabot.sh"
  schedule:
    # Weekly safety net: every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: {}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  sync:
    name: "🔄 Sync Dependabot Config"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0 # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.redhat.com:443
            *.centos.org:443
            *.rockylinux.org:443
            *.debian.org:443
            *.debian.org:80
            security.debian.org:443
            security.debian.org:80
            deb.debian.org:443
            deb.debian.org:80
            dl-cdn.alpinelinux.org:443
            registry.yarnpkg.com:443
            index.crates.io:443
            static.rust-lang.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443



      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # v4.2.2
        with:
          token: ${{ secrets.WORKFLOW_SECRET || secrets.GITHUB_TOKEN }}
          persist-credentials: true
          ref: ${{ github.ref }}

      - name: "🧪 Run Generator Smoke Test"
        shell: sh
        run: |
          sh tests/smoke-test-gen-dependabot.sh

      - name: "🤖 Generate Dependabot Config"
        shell: sh
        run: |
          sh scripts/gen-dependabot.sh
          if [ -f "dependabot_summary.md" ]; then
            cat dependabot_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: "📝 Commit Changes (if any)"
        shell: sh
        run: |
          if git diff --quiet .github/dependabot.yml 2>/dev/null; then
            echo "✅ No changes detected. Dependabot config is up-to-date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/dependabot.yml
            git commit -m "chore(deps): sync dependabot config [skip ci]"
            git push
            echo "✅ Dependabot config updated and pushed."
          fi
