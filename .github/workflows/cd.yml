---
# CD (Continuous Deployment)
# Purpose: Unified release pipeline covering Project Verification and Automated Release Orchestration.
# Trigger: Every push to the default branch (main).
# Design:
#   - Sequential execution: Verify -> Release Please.
#   - Atomic: Release only happens if verification passes.
#   - Secure: Eliminates workflow_run risks by using internal job dependencies.

name: "🚀 Continuous Delivery"

"on":
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions: {}

env:
  # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # 1. Project Verification Stage (Verify)
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: verify-${{ github.workflow }}-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
    timeout-minutes: 15
    env:
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            registry.npmjs.org:443
            repo.yarnpkg.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            mise.jdx.dev:443
            *.mise.jdx.dev:443
            index.docker.io:443
            auth.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            gcr.io:443
            *.gcr.io:443
            *-docker.pkg.dev:443
            quay.io:443
            *.quay.io:443
            public.ecr.aws:443
            *.amazonaws.com:443
            *.azurecr.io:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-
            ${{ runner.os }}-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
          MISE_OFFLINE=true make check-env
        env:
          VENV: ${{ env.VENV }}
          SKIP_MODULES: security

      - name: "🧪 Full Project Verification"
        shell: sh
        run: |
          MISE_OFFLINE=true make verify

  # 2. Release Orchestration Stage (Release Please)
  release-please:
    name: "🚀 Release Orchestration"
    needs: [verify]
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      security-events: write
    timeout-minutes: 15
    steps:
      - name: "📝 Orchestrate Release Lifecycle (Release Please)"
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          config-file: .release-please-config.json

      - name: "🏗️ Checkout Release PR Branch"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "📦 Setup Node Environment (Syncing)"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20.18.3"

      - name: "📦 Setup pnpm Environment"
        if: ${{ steps.release.outputs.pr && hashFiles('pnpm-lock.yaml') != '' }}
        uses: pnpm/action-setup@v5.0.0
        with:
          run_install: false

      - name: "🔗 Synchronize Manifests & Lockfiles"
        if: ${{ steps.release.outputs.pr }}
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --no-immutable
          elif [ -f "package-lock.json" ]; then
            npm install --package-lock-only
          fi
          git add .
          git commit -m "chore(release): synchronize lockfiles for version bump" || echo "No changes to sync"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD
