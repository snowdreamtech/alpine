---
# Continuous Delivery (Multi-Platform Docker Build)
# Purpose: Builds and pushes multi-platform Docker images to DockerHub, Quay.io, and GHCR.
# Trigger: Pushes to core branches, release tags, daily schedule, and manual dispatch.
# Permissions:
#   - contents: read (Required for repository checkout).
#   - packages: write (Required for GHCR push).
#   - id-token: write (Required for secure OIDC authentication).

name: GitHub Actions Continuous Delivery

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "desktop"
      - "gnome"
      - "plasma"
      - "xfce"
      - "mate"
      - "sway"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "V[0-9]+.[0-9]+.[0-9]+"
      - "alpine-*.*.*"
      - "[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+"
      - "V[0-9]+.[0-9]+"
      - "alpine-*.*"
      - "[0-9]+"
      - "v[0-9]+"
      - "V[0-9]+"
      - "alpine-*"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "desktop"
      - "gnome"
      - "plasma"
      - "xfce"
      - "mate"
      - "sway"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  schedule:
    # Automatically run on every Day
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  buildx:
    name: "🚀 Build & Deliver Manifest (ubuntu-latest)"
    runs-on: ubuntu-latest
    concurrency:
      group: cd-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
      id-token: write
    timeout-minutes: 60
    steps:
      # - name: Bypass Cloudflare for Github Action Pro
      #   uses: snowdreamtech/bypass-cloudflare-for-github-action@v0.0.4
      #   with:
      #     mode: 'list'
      #     cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
      #     cf_api_token: ${{ secrets.CF_API_TOKEN }}
      #     cf_zone_id: ${{ secrets.CF_ZONE_ID }}
      #     github_api_token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🧹 Optimize Runner Disk Space"
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # [Required] Access token with `workflow` scope.
          token: ${{ secrets.WORKFLOW_SECRET }}

      - name: "🔧 Configure Environment Variables"
        shell: sh
        run: |
          {
            echo "BRANCH=${GITHUB_REF##*/}"
            echo "http_proxy=${http_proxy}"
            echo "no_proxy=${no_proxy}"
          } >> "$GITHUB_ENV"

      - # Add support for more platforms with QEMU (optional)
        # https://github.com/docker/setup-qemu-action
        name: "🏗️ Configure QEMU Emulation"
        uses: docker/setup-qemu-action@v3.7.0

      - # https://github.com/docker/setup-buildx-action/issues/57#issuecomment-1059657292
        # https://github.com/docker/buildx/issues/136#issuecomment-550205439
        # docker buildx create --driver-opt env.http_proxy=$http_proxy --driver-opt env.https_proxy=$http_proxy --driver-opt '"env.no_proxy='$no_proxy'"'
        name: "🛠️ Configure Docker Buildx"
        uses: docker/setup-buildx-action@v3.12.0
        with:
          buildkitd-config: .github/buildkitd.toml
          driver-opts: |
            env.http_proxy=${{ env.http_proxy }}
            env.https_proxy=${{ env.http_proxy }}
            "env.no_proxy='${{ env.no_proxy}}'"

      - name: "🔑 Initialize DockerHub Registry Session"
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: "🔑 Initialize Quay.io Registry Session"
        uses: docker/login-action@v3.7.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: "🔑 Initialize GitHub Container Registry Session"
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🏷️ Generate Docker Metadata"
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: |
            name=snowdreamtech/alpine,enable=true
            name=ghcr.io/snowdreamtech/alpine,enable=true
            name=quay.io/snowdreamtech/alpine,enable=true
          flavor: |
            latest=false
            prefix=
            suffix=
          tags: |
            type=ref,enable=${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.event_name != 'schedule' }},priority=600,prefix=,suffix=,event=branch
            type=edge,enable=true,priority=700,prefix=,suffix=,branch=dev
            type=raw,enable=${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'schedule' }},priority=200,prefix=,suffix=,value=latest
            type=raw,enable=${{ startsWith(github.ref, 'refs/tags/') }},priority=200,prefix=,suffix=,value=latest
            type=schedule,enable=true,priority=1000,prefix=,suffix=,pattern=nightly
            type=match,enable=true,priority=800,prefix=,suffix=,pattern=\d+.\d+.\d+,group=0,value=
            type=match,enable=true,priority=800,prefix=,suffix=,pattern=\d+.\d+,group=0,value=
            type=match,enable=${{ !startsWith(github.ref, 'refs/tags/0.') && !startsWith(github.ref, 'refs/tags/v0.') && !startsWith(github.ref, 'refs/tags/V0.') && !startsWith(github.ref, 'refs/tags/alpine-0.') && !startsWith(github.ref, 'refs/tags/alpine-v0.') && !startsWith(github.ref, 'refs/tags/alpine-V0.') }},priority=800,prefix=,suffix=,pattern=\d+,group=0,value=
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: "🚀 Orchestrate Build & Delivery Suite"
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          build-args: |
            "http_proxy=${{ env.http_proxy }}"
            "https_proxy=${{ env.http_proxy }}"
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
          platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/ppc64le,linux/riscv64,linux/s390x
          push: ${{ github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/heads/feat/') && !startsWith(github.ref, 'refs/heads/feature/') && !startsWith(github.ref, 'refs/heads/fix/') && !startsWith(github.ref, 'refs/heads/pr/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
