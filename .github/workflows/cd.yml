---
# CD (Continuous Deployment)
# Purpose: Unified release pipeline covering Project Verification and Automated Release Orchestration.
# Trigger: Every push to the default branch (main).
# Design:
#   - Sequential execution: Verify -> Release Please.
#   - Atomic: Release only happens if verification passes.
#   - Secure: Eliminates workflow_run risks by using internal job dependencies.

name: "🚀 Continuous Delivery"

"on":
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions: {}

env:
  MISE_LOCKED: 1

jobs:
  # 1. Project Verification Stage (Verify)
  verify:
    name: "🏁 Pre-flight Integrity Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: verify-${{ github.workflow }}-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
      statuses: write
      security-events: write
    timeout-minutes: 15
    env:
      PYTHONUTF8: 1
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0 # v2.10.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            repo.yarnpkg.com:443
            mise.jdx.dev:443
            index.docker.io:443
            auth.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            gcr.io:443
            *.gcr.io:443
            *.pkg.dev:443
            quay.io:443
            *.quay.io:443
            public.ecr.aws:443
            osv-vulnerabilities.storage.googleapis.com:443
            api.osv.dev:443
            trivy-repo.aquasecurity.github.io:443
            *.aquasecurity.github.io:443
            pkg-containers.githubusercontent.com:443
            *.dkr.ecr.*.amazonaws.com:443
            *.azurecr.io:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # v4.2.2
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4 # v5.0.4
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml', 'scripts/lib/versions.sh') }}
          restore-keys: |
            ${{ runner.os }}-mise-
            ${{ runner.os }}-

      - name: "🚀 Initialize Development Environment"
        shell: sh
        run: |
          make setup
          make install
          MISE_OFFLINE=true make check-env
        env:
          MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VENV: ${{ env.VENV }}
          SKIP_MODULES: security

      - name: "📝 Validate Commit Convention (Commitlint)"
        shell: sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          _OS=$(uname -s)
          case "$_OS" in
            MINGW*|MSYS*|CYGWIN*) _MISE_NPM_BASE="${LOCALAPPDATA}/mise/installs" ;;
            *) _MISE_NPM_BASE="${HOME}/.local/share/mise/installs" ;;
          esac
          _EXTRA_NODE_PATH=""
          if [ -d "$_MISE_NPM_BASE" ]; then
            for _pkg_dir in "$_MISE_NPM_BASE"/npm-*/*/lib/node_modules; do
              [ -d "$_pkg_dir" ] || continue
              _EXTRA_NODE_PATH="${_EXTRA_NODE_PATH}${_EXTRA_NODE_PATH:+:}${_pkg_dir}"
            done
          fi
          export NODE_PATH="${_EXTRA_NODE_PATH}${_EXTRA_NODE_PATH:+:}${NODE_PATH:-}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            mise exec -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            mise exec -- commitlint --last --verbose
          fi

      - name: "🧪 Execute Full Quality & Safety Verification"
        shell: sh
        run: |
          MISE_OFFLINE=true make lint
          MISE_OFFLINE=true make test
          MISE_OFFLINE=true make audit
          # Extra SARIF export for GitHub Security Tab (Offline to prevent API rate limits)
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            mise exec -- zizmor . --format sarif --offline > zizmor-results.sarif
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: 1
          TRIVY_CACHE_DIR: .trivycache

      - name: "⚡ Cache Documentation Links (Lychee)"
        if: matrix.os == 'ubuntu-latest'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4 # v5.0.4
        with:
          path: .lycheecache
          key: ${{ runner.os }}-lychee-${{ hashFiles('**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: "🔗 Verify Documentation Links (Lychee)"
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0 # v2.8.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        with:
          args: --root-dir "${{ github.workspace }}" --verbose --no-progress --cache --exclude-path ".git" --exclude-path "node_modules" --exclude-path ".venv" --exclude-path "venv" --exclude-path "env" --exclude-path "vendor" --exclude-path "dist" --exclude-path "build" --exclude-path "out" --exclude-path "target" --exclude-path ".next" --exclude-path ".nuxt" --exclude-path ".output" --exclude-path "__pycache__" --exclude-path ".specify" '**/*.md'
          fail: true

      - name: "🕵️ Detect Vulnerabilities (Trivy FS)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v1.23.0 # v0.35.0
        if: ${{ always() && matrix.os == 'ubuntu-latest' }}
        env:
          TRIVY_DB_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-db"
          TRIVY_CHECKS_BUNDLE_REPOSITORY: "public.ecr.aws/aquasecurity/trivy-checks"
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          exit-code: "1"

      - name: "📤 Upload Security Audit (SARIF)"
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1 # v4.34.1
        if: always() && matrix.os == 'ubuntu-latest'
        with:
          sarif_file: "."

  # 2. Release Orchestration Stage (Release Please)
  release-please:
    name: "🚀 Release Orchestration"
    needs: [verify]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      statuses: write
      security-events: write
    timeout-minutes: 15
    steps:
      - name: "📝 Orchestrate Release Lifecycle (Release Please)"
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0 # v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          config-file: .release-please-config.json

      - name: "🏗️ Checkout Release PR Branch"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # v4.2.2
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: "📦 Setup Node Environment (Syncing)"
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # v4.2.0
        with:
          node-version: "20.18.3"

      - name: "📦 Setup pnpm Environment"
        if: ${{ steps.release.outputs.pr && hashFiles('pnpm-lock.yaml') != '' }}
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0 # v5.0.0
        with:
          run_install: false

      - name: "🔗 Synchronize Manifests & Lockfiles"
        if: ${{ steps.release.outputs.pr }}
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --no-frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            yarn install --no-immutable
          elif [ -f "package-lock.json" ]; then
            npm install --package-lock-only
          fi
          git add .
          git commit -m "chore(release): synchronize lockfiles for version bump" || echo "No changes to sync"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD
