---
name: Deploy Docs to GitHub Pages

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Environment Setup
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Build VitePress site
        run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
