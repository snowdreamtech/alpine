---
name: Deploy Docs to GitHub Pages

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "bun.lockb"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect package manager
        id: detect-pm
        # Priority: pnpm → yarn → npm → bun
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            {
              echo "manager=pnpm"
              echo "install=pnpm install --frozen-lockfile"
              echo "build=pnpm docs:build"
              echo "cache=pnpm"
            } >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            {
              echo "manager=yarn"
              echo "install=yarn install --frozen-lockfile"
              echo "build=yarn docs:build"
              echo "cache=yarn"
            } >> "$GITHUB_OUTPUT"
          elif [ -f "package-lock.json" ]; then
            {
              echo "manager=npm"
              echo "install=npm ci"
              echo "build=npm run docs:build"
              echo "cache=npm"
            } >> "$GITHUB_OUTPUT"
          elif [ -f "bun.lockb" ]; then
            {
              echo "manager=bun"
              echo "install=bun install --frozen-lockfile"
              echo "build=bun run docs:build"
              echo "cache=npm"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "manager=npm"
              echo "install=npm ci"
              echo "build=npm run docs:build"
              echo "cache=npm"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4.2.0
        with:
          version: latest

      - name: Setup Bun
        if: steps.detect-pm.outputs.manager == 'bun'
        uses: oven-sh/setup-bun@v2.1.2

      - name: Setup Node.js
        if: steps.detect-pm.outputs.manager != 'bun'
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: ${{ steps.detect-pm.outputs.cache }}

      - name: Install dependencies
        run: ${{ steps.detect-pm.outputs.install }}

      - name: Build VitePress site
        run: ${{ steps.detect-pm.outputs.build }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
