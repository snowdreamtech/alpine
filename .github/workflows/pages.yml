---
# Deploy Docs to GitHub Pages
# Purpose: Builds the VitePress documentation site and deploys it to GitHub Pages.
# Trigger: Runs on pushes to 'main' affecting 'docs/' or dependency manifests.
# Permissions:
#   - contents: read (Required for repository checkout).
#   - pages: write (Required for deploying to GitHub Pages).
#   - id-token: write (Required for OIDC-based deployment).
# Concurrency:
#   - group: pages (Ensures atomic documentation deployments).
#   - cancel-in-progress: false (Deploys must complete to ensure site consistency).
# Design:
#   - Decouples build and deployment jobs for enhanced traceability.
#   - Uses specific semantic version tags for VitePress and setup actions.

name: "📄 Deploy Docs to GitHub Pages"

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

env:
  # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: "🏗️ Documentation Compilation"
    runs-on: ubuntu-latest
    concurrency:
      group: pages-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: false # Never cancel in-progress deploys to avoid inconsistent states
    permissions:
      contents: read # Required for repository checkout
    timeout-minutes: 15
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}
      PYTHONUTF8: 1

    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bdad212e5be703cd14 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pypi.org:443
            registry.npmjs.org:443
            repo.yarnpkg.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            mise.jdx.dev:443
            *.mise.jdx.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@1d96c3a830132f11fdf16401030e64f2b380ed33 # v6.0.2
        # Fetches source documentation and site assets for the build process.
        with:
          # Pass GitHub Token to avoid triggering Rate Limit when accessing github.com links
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@0c45773b623bec8c04719ee12026d36e2f694609 # v5.0.4
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        run: |
          make setup
          make install

      - name: "🚀 compile documentation artifacts"
        shell: sh
        run: |
          # executes the documentation manager to install dependencies and build site.
          make docs ARGS="build"

      - name: "📦 Stage Assets for Web Deployment"
        uses: actions/upload-pages-artifact@e8f4f6b8109d9418ac934094a9a08e1329c41793 # v4.0.0
        with:
          # Bundles the compiled static site into a secure artifact for GitHub Pages.
          path: docs/.vitepress/dist

  deploy:
    name: "🚀 Live Web Deployment"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required for deploying to GitHub Pages
      id-token: write # Required for OIDC-based deployment
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    timeout-minutes: 10
    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@17d0e2bd7d51742c71671bdad212e5be703cd14 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@d6db901d84813589b9101c59080c655dd094f9b8 # v4.0.5
        # Finalizes the deployment, making the new documentation live.
