---
# Deploy Docs to GitHub Pages
# Purpose: Builds the VitePress documentation site and deploys it to GitHub Pages.
# Trigger: Runs on pushes to 'main' affecting 'docs/' or dependency manifests.
# Permissions:
#   - contents: read (Required for repository checkout).
#   - pages: write (Required for deploying to GitHub Pages).
#   - id-token: write (Required for OIDC-based deployment).
# Concurrency:
#   - group: pages (Ensures atomic documentation deployments).
#   - cancel-in-progress: false (Deploys must complete to ensure site consistency).
# Design:
#   - Decouples build and deployment jobs for enhanced traceability.
#   - Uses specific semantic version tags for VitePress and setup actions.

name: Deploy Docs to GitHub Pages

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false # Never cancel in-progress deploys to avoid inconsistent states

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for repository checkout
    timeout-minutes: 15
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24.1.0" # Stable long-term support version

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Environment Setup
        shell: sh
        run: |
          # Ensures the CI runner has the correct toolchain (Node, Python, pnpm).
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Build VitePress site
        shell: sh
        run: |
          # Compiles Markdown source into a static HTML site for production deployment.
          pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          # Points to the generated distribution folder
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required for deploying to GitHub Pages
      id-token: write # Required for OIDC-based deployment
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
