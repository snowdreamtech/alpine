---
# 🛡️ OpenSSF Scorecard Monitoring
# Purpose: Holistically evaluates the repository for security best practices.
# Trigger: Weekly schedule and push to main.
# Output: Results visible in the GitHub "Security" tab and as a public scorecard.

name: "🛡️ Scorecard Security Audit"

"on":
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard-action#removal-of-branch-protection-check
  # on how to set up this check.
  branch_protection_rule:
  # Schedule every Monday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 1"
  push:
    branches: ["main"]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: "🔍 Scorecard Analysis"
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Required for checking repository contents.
      contents: read
      # Required for checking branch protection rules.
      actions: read
    timeout-minutes: 20

    steps:
      - name: "🔒 Harden Runner (Security Egress Audit)"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            mise.run:443
            install.mise.jdx.dev:443
            *.mise.jdx.dev:443
            packages.microsoft.com:443
            *.ubuntu.com:80
            *.ubuntu.com:443
            *.debian.org:80
            *.debian.org:443
            deb.debian.org:80
            deb.debian.org:443
            security.debian.org:80
            security.debian.org:443
            *.rockylinux.org:443
            *.centos.org:443
            *.redhat.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            pypi.org:443
            files.pythonhosted.org:443
            proxy.golang.org:443
            sum.golang.org:443
            index.crates.io:443
            static.rust-lang.org:443
            packagist.org:443
            repo.maven.apache.org:443
            rubygems.org:443
            registry.terraform.io:443
            formulae.brew.sh:443
            api.deps.dev:443
            api.osv.dev:443
            api.securityscorecards.dev:443
            fulcio.sigstore.dev:443
            oss-fuzz-build-logs.storage.googleapis.com:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            www.bestpractices.dev:443

      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: "🔍 Run Scorecard Action"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "repo_token" is only needed for checking Branch-Protection of private repos.
          # For public repos, this can be omitted or passed via secrets.GITHUB_TOKEN.
          publish_results: true

      # Upload the results to GitHub's code scanning dashboard.
      - name: "📤 Upload SARIF Results"
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif
