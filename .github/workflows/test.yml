---
# Project Automated Test Runner
# Purpose: Executes the full test matrix across multiple languages (Shell, PowerShell, Python, Go).
# Trigger: Comprehensive coverage on every push and pull request.
# Permissions:
#   - contents: read (Required for codebase checkout).
#   - pull-requests: read (Required for PR context integration during testing).
# Concurrency:
#   - group: test-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Immediate resource release when newer commits arrive).
# Design:
#   - Uses unified 'make test' interface for parity between local and CI.
#   - Implements strict timeouts to prevent hung tests from consuming quota.

name: Test

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: "🧪 Automated Testing Suite (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    concurrency:
      group: test-${{ github.workflow }}-${{ matrix.os }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    strategy:
      # Validates logic integrity across the complete project compatibility matrix.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read # Required for codebase checkout
      pull-requests: read # Required for PR context integration during testing
    timeout-minutes: 30 # Matrix tests can be time-consuming
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}
      PYTHONUTF8: 1

    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # Minimum scope checkout to enable multi-stack test execution.
          persist-credentials: false

      - name: "⚡ Cache Mise Tools"
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.local/bin
            ~/.local/share/mise
            ~/Library/Application Support/mise
            ~/AppData/Local/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('.mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: "🚀 Initialize Development Environment"
        shell: sh # POSIX compliant
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "💻 Verify PowerShell Environment"
        shell: sh
        run: |
          # PowerShell is used for cross-platform platform logic; Verifying accessibility.
          pwsh --version

      - name: "🧪 Execute Multi-Stack Test Suite"
        shell: sh
        run: |
          # Runs the full cross-language matrix (Shell, PS, Python, Go) to ensure absolute stability.
          make test
        env:
          VENV: ${{ env.VENV }}
