---
# Project Automated Test Runner
# Purpose: Executes the full test matrix across multiple languages (Shell, PowerShell, Python, Go).
# Trigger: Comprehensive coverage on every push and pull request.
# Permissions:
#   - contents: read (Required for codebase checkout).
#   - pull-requests: read (Required for PR context integration during testing).
# Concurrency:
#   - group: test-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Immediate resource release when newer commits arrive).
# Design:
#   - Uses unified 'make test' interface for parity between local and CI.
#   - Implements strict timeouts to prevent hung tests from consuming quota.

name: Test

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "🧪 Automated Testing Suite"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for codebase checkout
      pull-requests: read # Required for PR context integration during testing
    timeout-minutes: 30 # Matrix tests can be time-consuming
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: "📂 Checkout Repository Code"
        uses: actions/checkout@v6.0.2
        with:
          # Minimum scope checkout to enable multi-stack test execution.
          persist-credentials: false

      - name: "📦 Configure pnpm Package Manager"
        uses: pnpm/action-setup@v4.2.0
        # pnpm is selected for its superior performance and strict dependency resolution.

      - name: "🟢 Configure Node.js Runtime"
        uses: actions/setup-node@v6.3.0
        with:
          # Standardized LTS Node version ensuring consistent behavior between CI and local dev.
          node-version: "24.1.0"

      - name: "🐍 Configure Python Runtime"
        uses: actions/setup-python@v6.2.0
        with:
          # Python 3.12 is the canonical platform for the project's logic validation modules.
          python-version: "3.12"

      - name: "🚀 Bootstrap Development Environment"
        shell: sh # POSIX compliant
        run: |
          # Standardizes the environment prep to mirror the local developer's initial 'make setup' flow.
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: "💻 Verify PowerShell Environment"
        shell: sh
        run: |
          # PowerShell is used for cross-platform platform logic; Verifying accessibility.
          pwsh --version

      - name: "🧪 Execute Multi-Stack Test Suite"
        shell: sh
        run: |
          # Runs the full cross-language matrix (Shell, PS, Python, Go) to ensure absolute stability.
          make test
        env:
          VENV: ${{ env.VENV }}
