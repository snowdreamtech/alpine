---
# Project Automated Test Runner
# Purpose: Executes the full test matrix across multiple languages (Shell, PowerShell, Python, Go).
# Trigger: Comprehensive coverage on every push and pull request.
# Permissions:
#   - contents: read (Required for codebase checkout).
#   - pull-requests: read (Required for PR context integration during testing).
# Concurrency:
#   - group: test-${{ github.event.pull_request.number || github.ref }} (Scoped to PR/ref).
#   - cancel-in-progress: true (Immediate resource release when newer commits arrive).
# Design:
#   - Uses unified 'make test' interface for parity between local and CI.
#   - Implements strict timeouts to prevent hung tests from consuming quota.

name: Test

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for codebase checkout
      pull-requests: read # Required for PR context integration during testing
    timeout-minutes: 30 # Matrix tests can be time-consuming
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24.1.0" # Explicit stable version

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Environment Setup
        shell: sh # POSIX compliant
        run: |
          # Bootstraps the development environment using standardized scripts.
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Setup PowerShell
        shell: sh
        run: |
          # PowerShell handles cross-platform scripting in this project; verifying presence.
          pwsh --version

      - name: Run Test Matrix (Shell & PowerShell & Python & Go)
        shell: sh
        run: |
          # Executes the unified test suite to validate logic across all supported stacks.
          make test
        env:
          VENV: ${{ env.VENV }}
