---
# Project Automated Test Runner
# Purpose: Executes the full test matrix including Shell, PowerShell, Python, and Go tests.
# Trigger: Runs on all pushes and PRs to safeguard logically critical changes.
# Design:
#   - Implements a unified test runner via 'make test'.
#   - Uses stable version tags for all environment setup actions.
#   - Implements aggressive timeouts to fail fast and save CI minutes.

name: Test

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions:
  contents: read # Required for code checkout
  pull-requests: read # Required for PR context if needed by tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Matrix tests can be time-consuming
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24.1.0" # Explicit stable version

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Environment Setup
        shell: sh # POSIX compliant
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Setup PowerShell
        shell: sh
        run: |
          # PowerShell is pre-installed on ubuntu-latest runners; verifying path.
          pwsh --version

      - name: Run Test Matrix (Shell & PowerShell & Python & Go)
        shell: sh
        run: make test
        env:
          VENV: ${{ env.VENV }}
