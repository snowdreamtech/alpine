---
name: Test

"on":
  push:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  pull_request:
    branches:
      - "main"
      - "dev"
      - "feat/**"
      - "branch/**"
      - "feature/**"
      - "fix/**"
      - "pr/**"
  workflow_dispatch:
    inputs:
      venv:
        description: "Virtual environment path"
        required: false
        default: ".venv"

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    env:
      VENV: ${{ github.event.inputs.venv || '.venv' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Run Environment Setup
        run: |
          make setup
          make install
        env:
          VENV: ${{ env.VENV }}

      - name: Setup PowerShell
        shell: sh
        run: |
          # PowerShell is pre-installed on ubuntu-latest runners.
          pwsh --version

      - name: Run Test Matrix (Shell & PowerShell & Python & Go)
        run: make test
        env:
          VENV: ${{ env.VENV }}
