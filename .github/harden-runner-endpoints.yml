---
# Harden Runner Allowed Endpoints Configuration
# This file defines endpoint profiles for step-security/harden-runner
# Used by scripts/sync-harden-runner.sh to update workflow files

# Profile: minimal
# For simple workflows that only interact with GitHub
minimal:
  - api.github.com:443
  - github.com:443
  - "*.githubusercontent.com:443"
  - mise.run:443
  - "*.mise.jdx.dev:443"

# Profile: standard
# For workflows that install dependencies from common package managers
standard:
  - api.github.com:443
  - github.com:443
  - "*.githubusercontent.com:443"
  - mise.run:443
  - "*.mise.jdx.dev:443"
  # Package managers
  - packages.microsoft.com:443
  - "*.ubuntu.com:80"
  - "*.ubuntu.com:443"
  - "*.debian.org:80"
  - "*.debian.org:443"
  - "*.rockylinux.org:443"
  - "*.centos.org:443"
  - "*.redhat.com:443"
  - dl-cdn.alpinelinux.org:443
  - registry.npmjs.org:443
  - registry.yarnpkg.com:443
  - pypi.org:443
  - files.pythonhosted.org:443
  - proxy.golang.org:443
  - sum.golang.org:443
  - index.crates.io:443
  - static.rust-lang.org:443
  - packagist.org:443
  - repo.maven.apache.org:443
  - rubygems.org:443
  - registry.terraform.io:443
  - formulae.brew.sh:443
  - repo.yarnpkg.com:443
  # CDN & Download mirrors
  - nodejs.org:443
  - deno.land:443
  - cdn.deno.land:443
  - downloads.gradle.org:443
  - services.gradle.org:443
  - downloads.gradle-dn.com:443

# Profile: full
# For CI/CD workflows with containers and security scanning
full:
  - api.github.com:443
  - github.com:443
  - "*.githubusercontent.com:443"
  - mise.run:443
  - "*.mise.jdx.dev:443"
  # Package managers
  - packages.microsoft.com:443
  - "*.ubuntu.com:80"
  - "*.ubuntu.com:443"
  - "*.debian.org:80"
  - "*.debian.org:443"
  - "*.rockylinux.org:443"
  - "*.centos.org:443"
  - "*.redhat.com:443"
  - dl-cdn.alpinelinux.org:443
  - registry.npmjs.org:443
  - registry.yarnpkg.com:443
  - pypi.org:443
  - files.pythonhosted.org:443
  - proxy.golang.org:443
  - sum.golang.org:443
  - index.crates.io:443
  - static.rust-lang.org:443
  - packagist.org:443
  - repo.maven.apache.org:443
  - rubygems.org:443
  - registry.terraform.io:443
  - formulae.brew.sh:443
  - repo.yarnpkg.com:443
  # CDN & Download mirrors
  - nodejs.org:443
  - deno.land:443
  - cdn.deno.land:443
  - downloads.gradle.org:443
  - services.gradle.org:443
  - downloads.gradle-dn.com:443
  # Container registries
  - ghcr.io:443
  - pkg-containers.githubusercontent.com:443
  - public.ecr.aws:443
  - production.cloudflare.docker.com:443
  - registry-1.docker.io:443
  - auth.docker.io:443
  - index.docker.io:443
  - "*.gcr.io:443"
  - "*.pkg.dev:443"
  - "*.quay.io:443"
  - "*.dkr.ecr.*.amazonaws.com:443"
  - "*.azurecr.io:443"
  # Security tools
  - osv-vulnerabilities.storage.googleapis.com:443
  - api.osv.dev:443
  - get.trivy.dev:443
  - "*.aquasecurity.github.io:443"
  - "*.sigstore.dev:443"

# Profile: audit
# For security audit workflows (scorecard, nightly-audit)
audit:
  - api.github.com:443
  - github.com:443
  - "*.githubusercontent.com:443"
  - mise.run:443
  - "*.mise.jdx.dev:443"
  # Container registries (minimal)
  - ghcr.io:443
  - pkg-containers.githubusercontent.com:443
  - public.ecr.aws:443
  - production.cloudflare.docker.com:443
  - registry-1.docker.io:443
  - auth.docker.io:443
  - index.docker.io:443
  # Security tools
  - osv-vulnerabilities.storage.googleapis.com:443
  - api.osv.dev:443
  - get.trivy.dev:443
  - "*.aquasecurity.github.io:443"
  - "*.sigstore.dev:443"
  - api.securityscorecards.dev:443
  - oss-fuzz-build-logs.storage.googleapis.com:443
  - www.bestpractices.dev:443

# Workflow to profile mapping
# Used by sync script to determine which profile to apply
workflow_profiles:
  cache.yml: minimal
  dco.yml: minimal
  dependabot-auto-merge.yml: minimal
  dependabot-sync.yml: minimal
  goreleaser.yml: minimal
  label-sync.yml: minimal
  labeler.yml: minimal
  pr-title.yml: minimal
  stale.yml: minimal
  codeql.yml: standard
  pages.yml: standard
  ci.yml: full
  cd.yml: full
  nightly-audit.yml: audit
  scorecard.yml: audit
